<html lang="ru">
<head>
  <meta charset="UTF-8" />

</head>
<body>
  <div id="allrecords">
<div id="id-app" class="id-app">
  <div class="id-header">
    <h2>Построение процессов на id-диаграмме воздуха</h2>
    <p>Для точки 1 заполните <b>ровно 2 параметра</b> из 4: t, i, φ, d. Затем задайте до 5 последовательных процессов.</p>
  </div>

  <div class="id-controls">
    <button type="button" id="resetBtn" class="secondary">Сброс</button>
  </div>

  <div id="pointsWrap" class="points-wrap"></div>

  <div class="id-controls">
    <button type="button" id="exportPdfBtn">Выгрузить отчет</button>
    <button type="button" id="addProcessBtn">+ Добавить процесс</button>
  </div>

  <div id="status" class="status"></div>

  <div class="chart-wrap">
    <canvas id="idChart" width="654" height="981"></canvas>
  </div>
</div>

<style>
  #allrecords .id-app {
    max-width: 1080px;
    margin: 0 auto 0;
    padding: 26px;
    font-family: "SF Pro Display", "Segoe UI", Arial, sans-serif;
    color: #12233b;
    background:
      radial-gradient(120% 90% at 0% 0%, rgba(165, 219, 255, 0.28) 0%, rgba(165, 219, 255, 0) 55%),
      radial-gradient(110% 100% at 100% 0%, rgba(190, 200, 255, 0.2) 0%, rgba(190, 200, 255, 0) 58%),
      rgba(243, 247, 252, 0.54);
    border: 1px solid rgba(255, 255, 255, 0.58);
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(21, 55, 98, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.55);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
    backdrop-filter: blur(20px) saturate(150%);
    box-sizing: border-box;
    position: relative;
    top: 10px;
    overflow: hidden;
  }

  #allrecords .id-app::before {
    content: "";
    position: absolute;
    inset: -120px -40px auto auto;
    width: 340px;
    height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0) 68%);
    pointer-events: none;
  }

  #allrecords .id-header h2 {
    margin: 0 0 8px;
    font-size: 32px;
    font-weight: 700;
    color: #AD1C42;
    letter-spacing: -0.02em;
    line-height: 1.2;
    text-wrap: balance;
  }

  #allrecords .id-header p {
    margin: 0 0 22px;
    color: #4b6488;
    font-size: 15px;
  }

  #allrecords .id-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
  }

  #allrecords .id-controls button {
    border: 1px solid rgba(255, 255, 255, 0.64);
    border-radius: 12px;
    background: linear-gradient(180deg, rgba(67, 151, 255, 0.95) 0%, rgba(25, 110, 214, 0.95) 100%);
    color: #fff;
    padding: 10px 15px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(20, 101, 195, 0.26), inset 0 1px 0 rgba(255, 255, 255, 0.28);
    transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
  }

  #allrecords .id-controls button:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 24px rgba(20, 101, 195, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.32);
    filter: saturate(108%);
  }

  #allrecords .id-controls button.secondary {
    background: linear-gradient(180deg, rgba(133, 149, 175, 0.9) 0%, rgba(111, 126, 153, 0.9) 100%);
    box-shadow: 0 8px 22px rgba(60, 77, 103, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.2);
  }

  #allrecords .points-wrap {
    display: grid;
    gap: 12px;
    margin-bottom: 16px;
  }

  #allrecords .point-row {
    display: grid;
    grid-template-columns: 90px repeat(4, minmax(130px, 1fr)) 56px;
    gap: 10px;
    align-items: center;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.7) 0%, rgba(242, 249, 255, 0.58) 100%);
    border: 1px solid rgba(255, 255, 255, 0.78);
    border-radius: 16px;
    padding: 12px;
    box-shadow: 0 10px 26px rgba(31, 67, 113, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.64);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
  }

  #allrecords .point-title {
    font-size: 14px;
    font-weight: 700;
    color: #1e3a63;
  }

  #allrecords .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  #allrecords .field label {
    font-size: 12px;
    color: #425a7e;
    font-weight: 600;
  }

  #allrecords .process-row .field label {
    min-height: 30px;
    line-height: 1.2;
    display: flex;
    align-items: flex-end;
  }

  #allrecords .field input,
  #allrecords .field select {
    width: 100%;
    box-sizing: border-box;
    border: 1px solid rgba(147, 176, 212, 0.54);
    border-radius: 11px;
    padding: 10px 11px;
    background: rgba(255, 255, 255, 0.7);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  }

  #allrecords .field select {
    background: #fff49a;
    border-color: #d1be50;
    font-weight: 700;
    color: #2b2b2b;
  }

  #allrecords .field input:focus,
  #allrecords .field select:focus {
    border-color: rgba(41, 126, 221, 0.9);
    background: rgba(255, 255, 255, 0.86);
    box-shadow: 0 0 0 3px rgba(50, 133, 227, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.74);
  }

  #allrecords .field select:focus {
    box-shadow: 0 0 0 3px rgba(209, 190, 80, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.74);
  }

  #allrecords .field input[readonly] {
    color: #2f4667;
    background: rgba(237, 245, 255, 0.72);
    border-color: rgba(147, 176, 212, 0.45);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.62);
  }

  #allrecords .field input[readonly]:focus {
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.62);
    border-color: rgba(147, 176, 212, 0.45);
    background: rgba(237, 245, 255, 0.72);
  }

  #allrecords .process-row {
    margin-bottom: 16px;
  }

  #allrecords .process-row.hidden {
    display: none;
  }

  #allrecords .row-tail {
    width: 100%;
    height: 1px;
  }

  #allrecords .remove-stage {
    border: 1px solid rgba(255, 255, 255, 0.7);
    background: linear-gradient(180deg, rgba(245, 249, 255, 0.85) 0%, rgba(224, 234, 248, 0.85) 100%);
    color: #3f5677;
    border-radius: 11px;
    height: 38px;
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    box-shadow: 0 8px 18px rgba(71, 98, 132, 0.16);
  }

  #allrecords .remove-stage.hidden {
    visibility: hidden;
    pointer-events: none;
  }

  #allrecords .status {
    min-height: 24px;
    font-size: 14px;
    margin-bottom: 12px;
  }

  #allrecords .status.error {
    color: #be2b2b;
  }

  #allrecords .status.ok {
    color: #187043;
  }

  #allrecords .status.loading {
    color: #1b79db;
  }

  #allrecords .chart-wrap {
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.66) 0%, rgba(242, 248, 255, 0.5) 100%);
    border: 1px solid rgba(255, 255, 255, 0.78);
    border-radius: 18px;
    padding: 14px;
    overflow-x: auto;
    display: flex;
    justify-content: center;
    box-shadow: 0 14px 34px rgba(28, 63, 107, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.64);
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
  }

  #allrecords #idChart {
    width: 654px;
    max-width: 654px;
    display: block;
    margin: 0 auto;
    border-radius: 12px;
    background: #ffffff;
  }

  .id-tooltip {
    position: fixed;
    z-index: 99999;
    width: max-content;
    max-width: calc(100vw - 20px);
    padding: 12px 14px;
    border-radius: 2px;
    border: 1px solid #d8d8d8;
    background: rgba(245, 245, 245, 0.98);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.16);
    color: #4a4a4a;
    font-family: "Roboto Mono", "RobotoMono", monospace;
    pointer-events: none;
    box-sizing: border-box;
  }

  .id-tooltip.hidden {
    display: none;
  }

  .id-tooltip-title {
    font-size: 14px;
    font-weight: 400;
    line-height: 1.18;
    margin-bottom: 8px;
  }

  .id-tooltip-line {
    font-size: 14px;
    font-weight: 400;
    line-height: 1.2;
    margin: 1px 0;
    white-space: nowrap;
  }

  .id-tooltip b {
    font-weight: 400;
  }

  @media (max-width: 940px) {
    #allrecords .id-app {
      top: -36px;
    }

    #allrecords .point-row {
      grid-template-columns: 1fr 1fr;
    }

    #allrecords .point-title {
      grid-column: 1 / -1;
    }

    #allrecords .row-tail {
      display: none;
    }
  }
</style>

<script>
(function () {
  var WEBHOOK_URL = 'https://frostily-tough-naiad.cloudpub.ru/webhook/bb91c741-d0df-4013-a9ba-0d171c7c2e22';
  var pointsWrap = document.getElementById('pointsWrap');
  var addProcessBtn = document.getElementById('addProcessBtn');
  var exportPdfBtn = document.getElementById('exportPdfBtn');
  var resetBtn = document.getElementById('resetBtn');
  var statusEl = document.getElementById('status');
  var canvas = document.getElementById('idChart');
  var ctx = canvas.getContext('2d');
  var hoverPoints = [];
  var hoverFlowM3h = NaN;
  var tooltipEl = null;
  var exportProcessRows = [];
  var BRAND_LOGO_URL = 'https://optim.tildacdn.com/tild3933-6438-4633-b733-306266393934/-/resize/500x/-/format/webp/logo_mail.png.webp';
  var brandLogoImage = null;
  var brandLogoLoadPromise = null;
  var MAX_PROCESSES = 5;
  var point1Row = null;
  var processStages = [];
  var point2AllowedByProcess = {
    heating: ['t', 'i', 'q'],
    cooling: ['t', 'rh', 'q'],
    adiabatic_humidification: ['rh', 'w'],
    isothermal_humidification: ['rh', 'w']
  };
  var P = 101.325;
  var debounceTimer = null;
  var calcRequestSeq = 0;
  var currentController = null;
  var chart = {
    left: 70,
    top: 22,
    right: canvas.width - 54,
    bottom: canvas.height - 48,
    dMin: 0,
    dMax: 35,
    iMin: 0,
    iMax: Math.floor(enthalpy(50, 35 / 1000) / 10) * 10,
    tMin: -35,
    tMax: 50
  };

  function fieldMeta(key, stage) {
    var pointIndex = stage ? stage.index + 1 : 2;
    if (key === 'q') {
      return stage && stage.typeEl.value === 'heating'
        ? { label: 'Q, кВт (Нагреватель)', placeholder: 'например, 8', option: 'Полная мощность Q, кВт' }
        : { label: 'Q, кВт (Охладитель)', placeholder: 'например, 18', option: 'Полная мощность Q, кВт' };
    }
    if (key === 'i') return { label: 'i, кДж/кг (Точка ' + pointIndex + ')', placeholder: 'например, 62', option: 'Энтальпия i, кДж/кг' };
    if (key === 'rh') return { label: 'φ, % (Точка ' + pointIndex + ')', placeholder: 'например, 92', option: 'Относительная влажность φ, %' };
    if (key === 'w') return { label: 'W, кг/ч (Увлажнитель)', placeholder: 'например, 5', option: 'Масса испарившейся воды W, кг/ч' };
    return { label: 't, °C (Точка ' + pointIndex + ')', placeholder: 'например, 16', option: 'Температура t, °C' };
  }

  function emptyPoint() {
    return { t: NaN, i: NaN, rh: NaN, d: NaN };
  }

  function toNum(value) {
    var n = Number(String(value == null ? '' : value).replace(',', '.').trim());
    return Number.isFinite(n) ? n : NaN;
  }

  function saturationPressure(T) {
    return 0.61078 * Math.exp((17.2694 * T) / (T + 237.29));
  }

  function humidityRatioFromTRH(T, RH) {
    var pws = saturationPressure(T);
    var pv = (RH / 100) * pws;
    return 0.62198 * pv / (P - pv);
  }

  function enthalpy(T, w) {
    return 1.005 * T + w * (2501 + 1.86 * T);
  }

  function tFromHW(h, w) {
    var den = 1.005 + 1.86 * w;
    return (h - 2501 * w) / den;
  }

  function dewPointFromPvKPa(pvKPa) {
    if (!isFinite(pvKPa) || pvKPa <= 0) return NaN;
    var low = -80;
    var high = 120;
    for (var n = 0; n < 90; n++) {
      var mid = (low + high) / 2;
      var pwsMid = saturationPressure(mid);
      if (pwsMid > pvKPa) high = mid; else low = mid;
    }
    return (low + high) / 2;
  }

  function wetBulbFromPoint(point) {
    if (!point || !isFinite(point.t) || !isFinite(point.i)) return NaN;
    var high = point.t;
    var low = -80;
    var hLowSat = enthalpy(low, humidityRatioFromTRH(low, 100));
    var hHighSat = enthalpy(high, humidityRatioFromTRH(high, 100));
    if (point.i <= hLowSat) return low;
    if (point.i >= hHighSat) return high;
    for (var n = 0; n < 90; n++) {
      var mid = (low + high) / 2;
      var hMidSat = enthalpy(mid, humidityRatioFromTRH(mid, 100));
      if (hMidSat > point.i) high = mid; else low = mid;
    }
    return (low + high) / 2;
  }

  function airDensityKgM3(point) {
    if (!point || !isFinite(point.t) || !isFinite(point.d)) return NaN;
    var tk = point.t + 273.15;
    if (tk <= 0) return NaN;
    var w = point.d / 1000;
    var pvKPa = (w * P) / (0.62198 + w);
    var paKPa = P - pvKPa;
    return paKPa * 1000 / (287.055 * tk) + pvKPa * 1000 / (461.495 * tk);
  }

  function formatTooltipNumber(value, digits) {
    if (!isFinite(value)) return '—';
    var p = Math.pow(10, digits);
    return (Math.round(value * p) / p).toFixed(digits);
  }

  function formatValue(key, value) {
    if (!isFinite(value)) return '';
    if (key === 't' || key === 'rh') return (Math.round(value * 10) / 10).toFixed(1);
    if (key === 'i' || key === 'd') return (Math.round(value * 100) / 100).toFixed(2);
    return String(value);
  }

  function formatPdfNumber(value, digits) {
    if (!isFinite(value)) return '—';
    var p = Math.pow(10, digits);
    return (Math.round(value * p) / p).toFixed(digits);
  }

  function drawRoundedRect(g, x, y, w, h, r) {
    var rr = Math.min(r, w / 2, h / 2);
    g.beginPath();
    g.moveTo(x + rr, y);
    g.lineTo(x + w - rr, y);
    g.quadraticCurveTo(x + w, y, x + w, y + rr);
    g.lineTo(x + w, y + h - rr);
    g.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
    g.lineTo(x + rr, y + h);
    g.quadraticCurveTo(x, y + h, x, y + h - rr);
    g.lineTo(x, y + rr);
    g.quadraticCurveTo(x, y, x + rr, y);
    g.closePath();
  }

  function pdfBrandingHeight() { return 42; }
  function pdfFooterHeight() { return 18; }

  function drawPdfBranding(g) {
    var leftPad = 10;
    var topPad = 8;
    var logoH = 26;
    var logoW = 86;
    var logoX = leftPad;
    var logoY = topPad;
    if (brandLogoImage) {
      var ratio = brandLogoImage.naturalWidth && brandLogoImage.naturalHeight ? brandLogoImage.naturalWidth / brandLogoImage.naturalHeight : 1;
      logoW = Math.max(70, Math.min(220, logoH * ratio));
      g.drawImage(brandLogoImage, logoX, logoY, logoW, logoH);
    } else {
      drawRoundedRect(g, logoX, logoY, logoW, logoH, 4);
      g.fillStyle = '#133f6e';
      g.fill();
      g.fillStyle = '#ffffff';
      g.font = '700 11px "Roboto Mono", "RobotoMono", monospace';
      g.textAlign = 'center';
      g.textBaseline = 'middle';
      g.fillText('OSNOVA', logoX + logoW / 2, logoY + logoH / 2 + 0.5);
    }
    var tx = logoX + logoW + 10;
    var y1 = logoY + logoH / 2;
    var programText = 'OSNOVA RHcalc i-d v.1.0.3 2026';
    var separatorText = ' | ';
    var siteText = 'osnovaprof.ru';
    g.fillStyle = '#1e3e63';
    g.font = '500 9px "Roboto Mono", "RobotoMono", monospace';
    g.textAlign = 'left';
    g.textBaseline = 'middle';
    g.fillText(programText + separatorText + siteText, tx, y1);
    var leftPartWidth = g.measureText(programText + separatorText).width;
    var siteWidth = g.measureText(siteText).width;
    g.textAlign = 'left';
    g.textBaseline = 'alphabetic';
    return { siteX: tx + leftPartWidth, siteY: y1 - 6, siteW: siteWidth, siteH: 12 };
  }

  function loadBrandLogo() {
    if (brandLogoLoadPromise) return brandLogoLoadPromise;
    brandLogoLoadPromise = new Promise(function (resolve) {
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function () {
        try {
          var testCanvas = document.createElement('canvas');
          testCanvas.width = Math.max(1, img.naturalWidth || img.width || 1);
          testCanvas.height = Math.max(1, img.naturalHeight || img.height || 1);
          testCanvas.getContext('2d').drawImage(img, 0, 0);
          testCanvas.toDataURL('image/png');
          brandLogoImage = img;
        } catch (e) {
          brandLogoImage = null;
        }
        resolve(brandLogoImage);
      };
      img.onerror = function () { brandLogoImage = null; resolve(null); };
      img.src = BRAND_LOGO_URL;
    });
    return brandLogoLoadPromise;
  }

  function drawPdfPageFooter(g, pageW, pageH, pageIndex, pageTotal) {
    g.fillStyle = '#6b7f95';
    g.font = '500 9px "Roboto Mono", "RobotoMono", monospace';
    g.textAlign = 'center';
    g.textBaseline = 'alphabetic';
    g.fillText(String(pageIndex) + '-' + String(pageTotal), pageW / 2, pageH - 4);
    g.textAlign = 'left';
    g.textBaseline = 'alphabetic';
  }

  function drawPdfProcessTable(g, topY, rows) {
    var padX = 22;
    var tableX = padX;
    var tableW = canvas.width - padX * 2;
    var rowH = 28;
    var headerH1 = 36;
    var headerH2 = 30;
    var titleH = 28;
    var tableH = titleH + headerH1 + headerH2 + rowH * Math.max(1, rows.length) + 14;
    var y = topY;
    drawRoundedRect(g, tableX, y, tableW, tableH, 10);
    g.fillStyle = '#f4f7fb';
    g.fill();
    g.strokeStyle = '#d0dae8';
    g.lineWidth = 1;
    g.stroke();
    g.fillStyle = '#173e68';
    g.font = '700 14px "Roboto Mono", monospace';
    g.fillText('Процессы', tableX + 14, y + 20);
    var gridTop = y + titleH;
    var colName = 140, colStartNo = 40, colStartT = 45, colStartRh = 38, colStartL = 47;
    var colEndNo = 40, colEndT = 45, colEndRh = 38, colEndL = 47, colQ = 55, colW = 55;
    var xName = tableX + 10;
    var xStart = xName + colName;
    var xEnd = xStart + colStartNo + colStartT + colStartRh + colStartL;
    var xQ = xEnd + colEndNo + colEndT + colEndRh + colEndL;
    var xW = xQ + colQ;
    var rightX = tableX + tableW - 10;
    g.fillStyle = '#294a6c';
    g.font = '600 10px "Roboto Mono", monospace';
    g.fillText('Наименование', xName + 2, gridTop + 22);
    g.fillText('Начальная точка', xStart + 2, gridTop + 14);
    g.fillText('Конечная точка', xEnd + 2, gridTop + 14);
    g.fillText('Q, кВт', xQ + 2, gridTop + 22);
    g.fillText('W, кг/ч', xW + 2, gridTop + 22);
    var subY = gridTop + headerH1 + 18;
    g.fillStyle = '#4c6480';
    g.font = '500 9px "Roboto Mono", monospace';
    g.fillText('№', xStart + 2, subY);
    g.fillText('t, °C', xStart + colStartNo + 2, subY);
    g.fillText('φ, %', xStart + colStartNo + colStartT + 2, subY);
    g.fillText('L, м³/ч', xStart + colStartNo + colStartT + colStartRh + 2, subY);
    g.fillText('№', xEnd + 2, subY);
    g.fillText('t, °C', xEnd + colEndNo + 2, subY);
    g.fillText('φ, %', xEnd + colEndNo + colEndT + 2, subY);
    g.fillText('L, м³/ч', xEnd + colEndNo + colEndT + colEndRh + 2, subY);
    g.strokeStyle = '#d8e0ec';
    g.lineWidth = 1;
    g.beginPath();
    g.moveTo(xName, gridTop + headerH1);
    g.lineTo(rightX, gridTop + headerH1);
    g.moveTo(xName, gridTop + headerH1 + headerH2);
    g.lineTo(rightX, gridTop + headerH1 + headerH2);
    g.stroke();
    var dataTop = gridTop + headerH1 + headerH2;
    var data = rows.length ? rows : [{ name: '—', color: '#9aa8ba', startNo: '—', startT: '—', startRh: '—', startL: '—', endNo: '—', endT: '—', endRh: '—', endL: '—', q: '—', w: '—' }];
    for (var r = 0; r < data.length; r++) {
      var row = data[r];
      var ry = dataTop + r * rowH;
      if (r > 0) {
        g.beginPath();
        g.moveTo(xName, ry);
        g.lineTo(rightX, ry);
        g.stroke();
      }
      g.fillStyle = row.color || '#6a7f95';
      g.fillRect(xName + 3, ry + 10, 6, 6);
      g.fillStyle = '#2b3f57';
      g.font = '500 10px "Roboto Mono", monospace';
      g.fillText(row.name, xName + 16, ry + 15);
      g.fillStyle = '#344e69';

      g.fillText(String(row.endNo), xEnd + 8, ry + 15);
      g.fillText(String(row.endT), xEnd + colEndNo + 8, ry + 15);
      g.fillText(String(row.endRh), xEnd + colEndNo + colEndT + 8, ry + 15);
      g.fillText(String(row.endL), xEnd + colEndNo + colEndT + colEndRh + 8, ry + 15);
      g.fillText(String(row.q), xQ + 8, ry + 15);
      g.fillText(String(row.w), xW + 8, ry + 15);
    }
  }

  function pdfTableHeight(rows) {

  function ensureTooltipEl() {
    if (tooltipEl) return;

  function hideTooltip() {
    if (tooltipEl) tooltipEl.classList.add('hidden');

  function buildTooltipHtml(item) {
    var point = item.point || {};
    var w = point.d / 1000;
    var pvKPa = (w * P) / (0.62198 + w);
    var pwsKPa = saturationPressure(point.t);
    var twb = wetBulbFromPoint(point);
    var tdp = dewPointFromPvKPa(pvKPa);
    var rho = airDensityKgM3(point);
    var volFlow = isFinite(hoverFlowM3h) && hoverFlowM3h > 0 ? hoverFlowM3h : NaN;
    var massFlow = isFinite(volFlow) && isFinite(rho) ? volFlow * rho : NaN;
    return '' +
      '<div class="id-tooltip-title">№: P' + item.index + '</div>' +
      '<div class="id-tooltip-line"><b>t:</b> ' + formatTooltipNumber(point.t, 1) + ' °C</div>' +
      '<div class="id-tooltip-line"><b>t<sub>вт</sub>:</b> ' + formatTooltipNumber(twb, 1) + ' °C</div>' +
      '<div class="id-tooltip-line"><b>t<sub>тр</sub>:</b> ' + formatTooltipNumber(tdp, 1) + ' °C</div>' +
      '<div class="id-tooltip-line"><b>φ:</b> ' + formatTooltipNumber(point.rh, 1) + '%</div>' +
      '<div class="id-tooltip-line"><b>d:</b> ' + formatTooltipNumber(point.d, 1) + ' г/кг</div>' +
      '<div class="id-tooltip-line"><b>I:</b> ' + formatTooltipNumber(point.i, 1) + ' кДж/кг</div>' +
      '<div class="id-tooltip-line"><b>ρ:</b> ' + formatTooltipNumber(rho, 2) + ' кг/м&sup3;</div>' +
      '<div class="id-tooltip-line"><b>Pп:</b> ' + formatTooltipNumber(pvKPa * 1000, 0) + ' Па</div>' +
      '<div class="id-tooltip-line"><b>Pн:</b> ' + formatTooltipNumber(pwsKPa * 1000, 0) + ' Па</div>' +
      '<div class="id-tooltip-line"><b>L:</b> ' + formatTooltipNumber(volFlow, 0) + ' м&sup3;/ч</div>' +
      '<div class="id-tooltip-line"><b>G:</b> ' + formatTooltipNumber(massFlow, 0) + ' кг/ч</div>';
  }

  function showTooltip(item, clientX, clientY) {
    ensureTooltipEl();
    tooltipEl.innerHTML = buildTooltipHtml(item);
    tooltipEl.classList.remove('hidden');
    var left = clientX + 16;
    var top = clientY + 16;
    var w = tooltipEl.offsetWidth;
    var h = tooltipEl.offsetHeight;
    var pad = 10;
    if (left + w > window.innerWidth - pad) left = clientX - w - 16;
    if (top + h > window.innerHeight - pad) top = clientY - h - 16;
    if (left < pad) left = pad;
    if (top < pad) top = pad;
    tooltipEl.style.left = left + 'px';
    tooltipEl.style.top = top + 'px';
  }

  function xFromD(d) {
    return chart.left + ((d - chart.dMin) / (chart.dMax - chart.dMin)) * (chart.right - chart.left);
  }

  function yFromT(t) {
    return chart.bottom - ((t - chart.tMin) / (chart.tMax - chart.tMin)) * (chart.bottom - chart.top);
  }

  function temperatureFromDRH(d, RH) {
    var targetW = d / 1000;
    var low = -60;
    var high = 120;
    for (var n = 0; n < 80; n++) {
      var mid = (low + high) / 2;
      var wMid = humidityRatioFromTRH(mid, RH);
      if (wMid > targetW) high = mid; else low = mid;
    }
    return (low + high) / 2;
  }

  function drawAxesAndGrid() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(chart.left, chart.top, chart.right - chart.left, chart.bottom - chart.top);
    ctx.strokeStyle = '#d6d6d6';
    ctx.lineWidth = 1;
    for (var d = chart.dMin; d <= chart.dMax; d += 5) {
      var xd = xFromD(d);
      ctx.beginPath();
      ctx.moveTo(xd, chart.top);
      ctx.lineTo(xd, chart.bottom);
      ctx.stroke();
    }
    for (var tGrid = chart.tMin; tGrid <= chart.tMax; tGrid += 5) {
      var yGrid = yFromT(tGrid);
      ctx.beginPath();
      ctx.strokeStyle = tGrid % 10 === 0 ? '#c6c6c6' : '#dddddd';
      ctx.moveTo(chart.left, yGrid);
      ctx.lineTo(chart.right, yGrid);
      ctx.stroke();
    }
    for (var tIso = chart.tMin; tIso <= chart.tMax; tIso += 10) {
      var yIso = yFromT(tIso);
      ctx.beginPath();
      ctx.strokeStyle = '#c3c3c3';
      ctx.moveTo(chart.left, yIso);
      ctx.lineTo(chart.right, yIso);
      ctx.stroke();
    }
    var enthalpyAngle = -Math.PI / 4;
    var guideX0 = xFromD(8);
    var guideY0 = yFromT(-20);
    function guideYAtX(x) { return guideY0 - (x - guideX0); }
    function findDForEnthalpyLabel(hVal) {
      var step = 0.25;
      var prevD = chart.dMin;
      var prevF = yFromT(tFromHW(hVal, prevD / 1000)) - guideYAtX(xFromD(prevD));
      for (var dTry = chart.dMin + step; dTry <= chart.dMax; dTry += step) {
        var fTry = yFromT(tFromHW(hVal, dTry / 1000)) - guideYAtX(xFromD(dTry));
        if (prevF === 0 || fTry === 0 || (prevF < 0 && fTry > 0) || (prevF > 0 && fTry < 0)) {
          var lo = prevD, hi = dTry, fLo = prevF;
          for (var it = 0; it < 30; it++) {
            var mid = (lo + hi) / 2;
            var fMid = yFromT(tFromHW(hVal, mid / 1000)) - guideYAtX(xFromD(mid));
            if (fMid === 0) return mid;
            if ((fLo < 0 && fMid > 0) || (fLo > 0 && fMid < 0)) hi = mid; else { lo = mid; fLo = fMid; }
          }
          return (lo + hi) / 2;
        }
        prevD = dTry;
        prevF = fTry;
      }
      return NaN;
    }
    var enthalpyLabels = [];
    var enthalpyLabelByH = {};
    for (var hLabel = 0; hLabel <= 100; hLabel += 5) {
      var dLabel = findDForEnthalpyLabel(hLabel);
      if (!isFinite(dLabel)) continue;
      var tLabel = tFromHW(hLabel, dLabel / 1000);
      if (tLabel < chart.tMin || tLabel > chart.tMax) continue;
      var labelPoint = { h: hLabel, d: dLabel, x: xFromD(dLabel), y: yFromT(tLabel) };
      enthalpyLabels.push(labelPoint);
      enthalpyLabelByH[hLabel] = labelPoint;
    }
    for (var hLine = chart.iMin; hLine <= chart.iMax; hLine += 5) {
      ctx.beginPath();
      var startedH = false;
      var stopPoint = enthalpyLabelByH[hLine];
      ctx.strokeStyle = '#d0d0d0';
      for (var dH = chart.dMin; dH <= chart.dMax; dH += 0.1) {
        var tH = tFromHW(hLine, dH / 1000);
        if (tH < chart.tMin || tH > chart.tMax) continue;
        var xH = xFromD(dH), yH = yFromT(tH);
        if (!startedH) { ctx.moveTo(xH, yH); startedH = true; } else { ctx.lineTo(xH, yH); }
        if (stopPoint && dH >= stopPoint.d) { ctx.lineTo(stopPoint.x, stopPoint.y); break; }
      }
      ctx.stroke();
    }
    ctx.fillStyle = '#3f3f3f';
    ctx.font = '12px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (var eh = 0; eh < enthalpyLabels.length; eh++) {
      ctx.save();
      ctx.translate(enthalpyLabels[eh].x, enthalpyLabels[eh].y);
      ctx.rotate(enthalpyAngle);
      ctx.fillText(String(enthalpyLabels[eh].h), 0, 0);
      ctx.restore();
    }
    if (enthalpyLabels.length) {
      var midPoint = enthalpyLabels[Math.min(Math.floor(enthalpyLabels.length * 0.55), enthalpyLabels.length - 1)];
      ctx.save();
      ctx.translate(midPoint.x + 20 * Math.cos(enthalpyAngle + Math.PI / 2), midPoint.y + 20 * Math.sin(enthalpyAngle + Math.PI / 2));
      ctx.rotate(enthalpyAngle);
      ctx.fillStyle = '#9a9a9a';
      ctx.font = '12px Arial';
      ctx.fillText('Энтальпия I, кДж/кг', 0, 0);
      ctx.restore();
    }
    for (var rh = 10; rh <= 100; rh += 10) {
      ctx.beginPath();
      var started = false;
      ctx.strokeStyle = rh === 100 ? '#5f9fd8' : '#92c7ee';
      ctx.lineWidth = rh === 100 ? 2.0 : 1.5;
      for (var dRh = chart.dMin; dRh <= chart.dMax; dRh += 0.2) {
        var tRh = temperatureFromDRH(dRh, rh);
        var xRh = xFromD(dRh);
        var yRh = yFromT(Math.max(chart.tMin, Math.min(chart.tMax, tRh)));
        if (!started) { ctx.moveTo(xRh, yRh); started = true; } else { ctx.lineTo(xRh, yRh); }
      }
      ctx.stroke();
      ctx.fillStyle = '#3f3f3f';
      ctx.font = '11px Arial';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      if (rh <= 40) {
        var tTopLabel = chart.tMax - 2;
        var dTopLabel = humidityRatioFromTRH(tTopLabel, rh) * 1000;
        if (dTopLabel >= chart.dMin && dTopLabel <= chart.dMax) ctx.fillText(rh + '%', xFromD(dTopLabel) - 12, chart.top - 4);
      } else {
        var yLabel = yFromT(Math.max(chart.tMin, Math.min(chart.tMax, temperatureFromDRH(chart.dMax, rh))));
        ctx.fillText(rh + '%', xFromD(chart.dMax) + 6, yLabel - 3);
      }
    }
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 0.6;
    ctx.strokeRect(chart.left, chart.top, chart.right - chart.left, chart.bottom - chart.top);
    ctx.fillStyle = '#4a4a4a';
    ctx.font = '12px Arial';
    for (var dlab = chart.dMin; dlab <= chart.dMax; dlab += 5) ctx.fillText(String(dlab), xFromD(dlab) - 7, chart.bottom + 18);
    for (var tLab = chart.tMin; tLab <= chart.tMax; tLab += 5) ctx.fillText(String(tLab), chart.left - 38, yFromT(tLab) + 4);
    ctx.font = 'bold 13px Arial';
    ctx.fillStyle = '#8f8f8f';
    ctx.fillText('Влагосодержание d, г/кг', (chart.left + chart.right) / 2 - 78, chart.bottom + 36);
    ctx.save();
    ctx.translate(18, (chart.top + chart.bottom) / 2 + 60);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('Температура по сухому термометру t, °C', 0, 0);
    ctx.restore();
  }

  function drawProcess(points) {
    drawAxesAndGrid();
    hideTooltip();
    if (!points.length) {
      hoverPoints = [];
      return;
    }
    var pointHits = [];
    function processSegmentColor(p1, p2) {
      var eps = 0.05;
      if (p2.t < p1.t - eps) return '#2a72d6';
      if (p2.t > p1.t + eps) return '#d33636';
      return '#2f9d4f';
    }
    for (var i = 0; i < points.length; i++) {
      var p = points[i];
      var x = xFromD(p.d);
      var y = yFromT(p.t);
      if (i > 0) {
        var prev = points[i - 1];
        var px = xFromD(prev.d);
        var py = yFromT(prev.t);
        var segColor = processSegmentColor(prev, p);
        ctx.beginPath();
        ctx.strokeStyle = segColor;
        ctx.lineWidth = 2;
        ctx.moveTo(px, py);
        ctx.lineTo(x, y);
        ctx.stroke();
        var ang = Math.atan2(y - py, x - px);
        var len = 10;
        ctx.beginPath();
        ctx.fillStyle = segColor;
        ctx.moveTo(x, y);
        ctx.lineTo(x - len * Math.cos(ang - 0.35), y - len * Math.sin(ang - 0.35));
        ctx.lineTo(x - len * Math.cos(ang + 0.35), y - len * Math.sin(ang + 0.35));
        ctx.closePath();
        ctx.fill();
      }
      var pointColor = points.length > 1 ? (i === 0 ? processSegmentColor(points[0], points[1]) : processSegmentColor(points[i - 1], points[i])) : '#d33636';
      ctx.beginPath();
      ctx.fillStyle = pointColor;
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fill();
      pointHits.push({ index: i + 1, point: p, x: x, y: y });
      ctx.font = '12px Arial';
      ctx.fillStyle = '#1f2f47';
      ctx.fillText('P' + (i + 1), x + 7, y - 8);
    }
    hoverPoints = pointHits;
  }

  function handleCanvasHover(evt) {
    if (!hoverPoints.length) return hideTooltip();
    var rect = canvas.getBoundingClientRect();
    if (!rect.width || !rect.height) return hideTooltip();
    var scaleX = canvas.width / rect.width;
    var scaleY = canvas.height / rect.height;
    var mx = (evt.clientX - rect.left) * scaleX;
    var my = (evt.clientY - rect.top) * scaleY;
    var hit = null;
    var bestDist2 = 121;
    for (var i = 0; i < hoverPoints.length; i++) {
      var hp = hoverPoints[i];
      var dx = hp.x - mx;
      var dy = hp.y - my;
      var dist2 = dx * dx + dy * dy;
      if (dist2 <= bestDist2) { bestDist2 = dist2; hit = hp; }
    }
    if (!hit) return hideTooltip();
    showTooltip(hit, evt.clientX, evt.clientY);
  }

  function setStatus(msg, state) {
    statusEl.textContent = msg || '';
    statusEl.className = 'status';
    if (!msg) return;
    if (state === 'error') statusEl.classList.add('error');
    else if (state === 'loading') statusEl.classList.add('loading');
    else statusEl.classList.add('ok');
  }

  function setStageParamOptions(stage, preserveSelection) {
    var processType = stage.typeEl.value;
    var allowed = point2AllowedByProcess[processType] || point2AllowedByProcess.heating;
    var prevKey = preserveSelection ? stage.paramEl.value : '';
    stage.paramEl.innerHTML = '';
    for (var i = 0; i < allowed.length; i++) {
      var key = allowed[i];
      var meta = fieldMeta(key, stage);
      var opt = document.createElement('option');
      opt.value = key;
      opt.textContent = meta.option;
      stage.paramEl.appendChild(opt);
    }
    stage.paramEl.value = allowed.indexOf(prevKey) !== -1 ? prevKey : allowed[0];
    updateStageValueMeta(stage);
  }

  function updateStageValueMeta(stage) {
    var meta = fieldMeta(stage.paramEl.value, stage);
    stage.valueLabelEl.textContent = meta.label;
    stage.valueEl.placeholder = meta.placeholder;
  }

  function clearPointRow(row) {
    Array.prototype.forEach.call(getRowInputs(row), function (inp) { inp.value = ''; });
  }

  function fillPointRow(row, data) {
    Array.prototype.forEach.call(getRowInputs(row), function (inp) {
      var key = inp.getAttribute('data-key');
      inp.value = data && isFinite(data[key]) ? formatValue(key, data[key]) : '';
    });
  }

  function clearPoint1Auto() {
    Array.prototype.forEach.call(getRowInputs(point1Row), function (inp) {
      if (inp.getAttribute('data-manual') === '1') return;
      inp.value = '';
      inp.setAttribute('data-auto', '0');
    });
  }

  function fillPoint1Auto(data) {
    Array.prototype.forEach.call(getRowInputs(point1Row), function (inp) {
      var key = inp.getAttribute('data-key');
      if (inp.getAttribute('data-manual') === '1') return;
      inp.value = formatValue(key, data[key]);
      inp.setAttribute('data-auto', '1');
    });
  }

  function clearStagePoints(fromIndex) {
    for (var i = fromIndex; i < processStages.length; i++) clearPointRow(processStages[i].pointRow);
  }

  function attachPoint1Listeners() {
    Array.prototype.forEach.call(getRowInputs(point1Row), function (inp) {
      inp.setAttribute('data-manual', '0');
      inp.setAttribute('data-auto', '0');
      inp.addEventListener('input', function () {
        var raw = inp.value.trim();
        inp.setAttribute('data-manual', raw === '' ? '0' : '1');
        inp.setAttribute('data-auto', '0');
        recalcAll();
      });
    });
  }

  function collectManualPoint1Data() {
    var values = emptyPoint();
    var manualKeys = [];
    Array.prototype.forEach.call(getRowInputs(point1Row), function (inp) {
      var key = inp.getAttribute('data-key');
      if (inp.getAttribute('data-manual') !== '1') return;
      var value = toNum(inp.value);
      if (isFinite(value)) {
        values[key] = value;
        manualKeys.push(key);
      }
    });
    return { values: values, manualKeys: manualKeys };
  }

  function updateAddProcessBtnState() {
    var canAdd = processStages.length < MAX_PROCESSES;
    addProcessBtn.disabled = !canAdd;
    addProcessBtn.style.opacity = canAdd ? '1' : '0.6';
    addProcessBtn.style.cursor = canAdd ? 'pointer' : 'not-allowed';
  }

  function attachStageListeners(stage) {
    stage.typeEl.addEventListener('change', function () {
      setStageParamOptions(stage, false);
      stage.valueEl.value = '';
      recalcAll();
    });
    stage.paramEl.addEventListener('change', function () {
      updateStageValueMeta(stage);
      stage.valueEl.value = '';
      recalcAll();
    });
    stage.valueEl.addEventListener('input', recalcAll);
    stage.flowEl.addEventListener('input', function () {
      if (stage.index === 1) {
        for (var i = 1; i < processStages.length; i++) processStages[i].flowEl.value = stage.flowEl.value;
      }
      recalcAll();
    });
    stage.removeBtn.addEventListener('click', function () { removeProcessStage(stage); });
  }

  function syncStageUi(stage) {
    var isFirst = stage.index === 1;
    stage.titleEl.textContent = 'Процесс ' + stage.index;
    stage.pointTitleEl.textContent = 'Точка ' + (stage.index + 1);
    stage.flowLabelEl.textContent = isFirst ? 'Расход воздуха, м³/ч' : 'Расход воздуха (из процесса 1), м³/ч';
    stage.flowEl.readOnly = !isFirst;
    stage.flowEl.placeholder = isFirst ? 'например, 1200' : 'из процесса 1';
    if (!isFirst && processStages.length) stage.flowEl.value = processStages[0].flowEl.value;
    stage.removeBtn.classList.toggle('hidden', isFirst);
    stage.removeBtn.disabled = isFirst;
    updateStageValueMeta(stage);
  }

  function renumberStages() {
    for (var i = 0; i < processStages.length; i++) {
      processStages[i].index = i + 1;
      syncStageUi(processStages[i]);
    }
  }

  function removeProcessStage(stage) {
    if (stage.index === 1) return;
    var idx = processStages.indexOf(stage);
    if (idx <= 0) return;
    stage.processRow.remove();
    stage.pointRow.remove();
    processStages.splice(idx, 1);
    renumberStages();
    updateAddProcessBtnState();
    recalcAll();
  }

  function addProcessStage() {
    if (processStages.length >= MAX_PROCESSES) return;
    var stageIndex = processStages.length + 1;
    var processRow = processRowTemplate(stageIndex);
    var pointRow = pointRowTemplate(stageIndex + 1, true);
    var stage = {
      index: stageIndex,
      processRow: processRow,
      pointRow: pointRow,
      titleEl: processRow.querySelector('.point-title'),
      pointTitleEl: pointRow.querySelector('.point-title'),
      flowLabelEl: processRow.querySelector('label[data-role="flow-label"]'),
      typeEl: processRow.querySelector('select[data-role="type"]'),
      flowEl: processRow.querySelector('input[data-role="flow"]'),
      paramEl: processRow.querySelector('select[data-role="param"]'),
      valueEl: processRow.querySelector('input[data-role="value"]'),
      valueLabelEl: processRow.querySelector('label[data-role="value-label"]'),
      removeBtn: processRow.querySelector('button[data-role="remove"]')
    };
    setStageParamOptions(stage, false);
    attachStageListeners(stage);
    processStages.push(stage);
    pointsWrap.appendChild(processRow);
    pointsWrap.appendChild(pointRow);
    renumberStages();
    updateAddProcessBtnState();
    recalcAll();
  }

  function createRows() {
    pointsWrap.innerHTML = '';
    processStages = [];
    point1Row = pointRowTemplate(1, false);
    pointsWrap.appendChild(point1Row);
    attachPoint1Listeners();
    addProcessStage();
    updateAddProcessBtnState();
  }

  function normalizePoint(data) {
    if (!data || typeof data !== 'object') return null;
    return { t: toNum(data.t), i: toNum(data.i), rh: toNum(data.rh), d: toNum(data.d) };
  }

  function normalizeServerResponse(data) {
    if (!data || typeof data !== 'object') throw new Error('Сервер вернул пустой ответ.');
    return {
      point1: normalizePoint(data.point1),
      stagePoints: Array.isArray(data.stagePoints) ? data.stagePoints.map(normalizePoint) : [],
      points: Array.isArray(data.points) ? data.points.map(normalizePoint).filter(Boolean) : [],
      exportProcessRows: Array.isArray(data.exportProcessRows) ? data.exportProcessRows : [],
      hoverFlowM3h: toNum(data.hoverFlowM3h),
      statusMessage: String(data.statusMessage || ''),
      statusIsError: !!data.statusIsError,
      statusType: data.statusType || (data.statusIsError ? 'error' : 'ok')
    };
  }

  function syncStageFlows() {
    if (!processStages.length) return;
    var flowValue = processStages[0].flowEl.value;
    for (var i = 1; i < processStages.length; i++) processStages[i].flowEl.value = flowValue;
  }

  function buildPayload() {
    syncStageFlows();
    var point1 = collectManualPoint1Data();
    return {
      point1: {
        values: point1.values,
        manualKeys: point1.manualKeys
      },
      stages: processStages.map(function (stage) {
        return {
          index: stage.index,
          type: stage.typeEl.value,
          flow: stage.flowEl.value.trim(),
          param: stage.paramEl.value,
          value: stage.valueEl.value.trim()
        };
      })
    };
  }

  function hasAnyInput(payload) {
    if (payload.point1.manualKeys.length) return true;
    for (var i = 0; i < payload.stages.length; i++) {
      var stage = payload.stages[i];
      if (stage.flow || stage.value) return true;
    }
    return false;
  }

  function applyServerResult(result) {
    clearPoint1Auto();
    clearStagePoints(0);
    exportProcessRows = result.exportProcessRows.slice();
    hoverFlowM3h = isFinite(result.hoverFlowM3h) ? result.hoverFlowM3h : NaN;
    if (result.point1) fillPoint1Auto(result.point1);
    for (var i = 0; i < processStages.length; i++) {
      if (result.stagePoints[i]) fillPointRow(processStages[i].pointRow, result.stagePoints[i]);
    }
    drawProcess(result.points);
    setStatus(result.statusMessage, result.statusType);
  }

  function clearComputedState() {
    clearPoint1Auto();
    clearStagePoints(0);
    exportProcessRows = [];
    hoverFlowM3h = NaN;
    drawAxesAndGrid();
    setStatus('', '');
  }

  function requestCalculation() {
    var payload = buildPayload();
    if (!hasAnyInput(payload)) {
      if (currentController) currentController.abort();
      clearComputedState();
      return;
    }
    var requestId = ++calcRequestSeq;
    if (currentController) currentController.abort();
    currentController = window.AbortController ? new AbortController() : null;
    setStatus('Выполняется расчет...', 'loading');
    fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: currentController ? currentController.signal : undefined
    }).then(function (response) {
      if (!response.ok) throw new Error('HTTP ' + response.status);
      return response.json();
    }).then(function (data) {
      if (requestId !== calcRequestSeq) return;
      applyServerResult(normalizeServerResponse(data));
    }).catch(function (err) {
      if (err && err.name === 'AbortError') return;
      console.error(err);
      setStatus('Расчетный сервер недоступен, мы уже работаем над устранением неполадки. Попробуйте повторить попытку позже.', 'error');
    });
  }

  function recalcAll() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(requestCalculation, 250);
  }

  function resetForm() {
    if (currentController) currentController.abort();
    clearTimeout(debounceTimer);
    createRows();
    clearComputedState();
  }

  addProcessBtn.addEventListener('click', addProcessStage);
  exportPdfBtn.addEventListener('click', exportDiagramPdf);
  resetBtn.addEventListener('click', resetForm);
  canvas.addEventListener('mousemove', handleCanvasHover);
  canvas.addEventListener('mouseleave', hideTooltip);

  createRows();
  drawAxesAndGrid();
})();
</script>
  </div>
</body>
</html>
