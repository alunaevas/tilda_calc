<body>

<div id="id-app" class="id-app">

    <button type="button" id="resetBtn" class="secondary">Сброс</button>
  </div>

  <div id="pointsWrap" class="points-wrap"></div>

  <div class="id-controls">
    <button type="button" id="exportPdfBtn">Выгрузить отчет</button>
    <button type="button" id="addProcessBtn">+ Добавить процесс</button>
  </div>

  <div id="status" class="status"></div>

  <div class="chart-wrap">
    <canvas id="idChart" width="654" height="981"></canvas>
  </div>
</div>

<style>

  #allrecords .chart-wrap {

  #allrecords #idChart {

  .id-tooltip {

  .id-tooltip.hidden {

  .id-tooltip-title {

  .id-tooltip b {

  @media (max-width: 940px) {
    #allrecords .id-app {
      top: -36px;
    }

    #allrecords .point-row {
      grid-template-columns: 1fr 1fr;

    #allrecords .process-row {
      grid-template-columns: 1fr 1fr;

    #allrecords .point-title {
      grid-column: 1 / -1;
    }

    #allrecords .process-row .field,
    #allrecords .process-row .remove-stage {

</style>

<script>
(function () {
  var pointsWrap = document.getElementById('pointsWrap');
  var addProcessBtn = document.getElementById('addProcessBtn');
  var exportPdfBtn = document.getElementById('exportPdfBtn');
  var resetBtn = document.getElementById('resetBtn');
  var statusEl = document.getElementById('status');
  var canvas = document.getElementById('idChart');
  var ctx = canvas.getContext('2d');
  var hoverPoints = [];
  var lastDrawState = { points: [], segments: [] };
  var tooltipEl = null;
  var exportProcessRows = [];
  var BRAND_LOGO_URL = 'https://optim.tildacdn.com/tild3933-6438-4633-b733-306266393934/-/resize/500x/-/format/webp/logo_mail.png.webp';
  var brandLogoImage = null;
  var brandLogoLoadPromise = null;

  var MAX_PROCESSES = 5;
  var point1Row = null;
  var processStages = [];
  var point1Solved = null;
  var COIL_SURFACE_T = 9; // °C (значение по умолчанию для температуры воздухоохладителя)
  var point2AllowedByProcess = {
    heating: ['t', 'i', 'q'],
    cooling: ['t', 'rh', 'q'],
    adiabatic_humidification: ['rh', 'w'],
    isothermal_humidification: ['rh', 'w'],
    merge_streams: []
  };
  var fieldMeta = {
    t: {
      option: 'Температура t, °C',
      label: 't, °C (Точка 2)',
      placeholder: 'например, 16'
    },
    i: {
      option: 'Энтальпия i, кДж/кг',
      label: 'i, кДж/кг (Точка 2)',
      placeholder: 'например, 62'
    },
    rh: {
      option: 'Относительная влажность φ, %',
      label: 'φ, % (Точка 2)',
      placeholder: 'например, 92'
    },
    q: {
      option: 'Полная мощность Q, кВт',
      label: 'Q, кВт (Теплообменник)',
      placeholder: 'например, 12'
    },
    w: {
      option: 'Масса испарившейся воды W, кг/ч',
      label: 'W, кг/ч (Увлажнитель)',
      placeholder: 'например, 5'
    },
    d: {
      option: 'Влагосодержание d, г/кг',
      label: 'd, г/кг',
      placeholder: 'например, 9'
    }
  };
  var mergePointParamKeys = ['t', 'rh', 'd', 'i'];

  var P = 101.325; // кПа
  var chart = {
    left: 70,
    top: 22,
    right: canvas.width - 54,
    bottom: canvas.height - 48,
    dMin: 0,
    dMax: 35,
    iMin: 0,
    iMax: Math.floor(enthalpy(50, 35 / 1000) / 10) * 10,
    tMin: -35,
    tMax: 50
  };

  function emptyPoint() {
    return {
      t: NaN,
      i: NaN,
      rh: NaN,
      d: NaN
    };
  }

  function saturationPressure(T) {
    return 0.61078 * Math.exp((17.2694 * T) / (T + 237.29));
  }

  function humidityRatioFromTRH(T, RH) {
    var pws = saturationPressure(T);
    var pv = (RH / 100) * pws;
    return 0.62198 * pv / (P - pv);
  }

  function enthalpy(T, w) {
    return 1.005 * T + w * (2501 + 1.86 * T);
  }

  function wFromTH(T, h) {
    var den = 2501 + 1.86 * T;
    return (h - 1.005 * T) / den;
  }

  function tFromHW(h, w) {
    var den = 1.005 + 1.86 * w;
    return (h - 2501 * w) / den;
  }

  function rhFromTW(T, w) {
    var pv = (w * P) / (0.62198 + w);
    var pws = saturationPressure(T);
    return 100 * (pv / pws);
  }

  function dewPointFromPvKPa(pvKPa) {
    if (!isFinite(pvKPa) || pvKPa <= 0) return NaN;
    var low = -80;
    var high = 120;
    for (var n = 0; n < 90; n++) {
      var mid = (low + high) / 2;
      var pwsMid = saturationPressure(mid);
      if (pwsMid > pvKPa) high = mid; else low = mid;
    }
    return (low + high) / 2;
  }

  function wetBulbFromPoint(point) {
    if (!point || !isFinite(point.t) || !isFinite(point.i)) return NaN;
    var high = point.t;
    var low = -80;
    var hLowSat = enthalpy(low, humidityRatioFromTRH(low, 100));
    var hHighSat = enthalpy(high, humidityRatioFromTRH(high, 100));
    if (point.i <= hLowSat) return low;
    if (point.i >= hHighSat) return high;
    for (var n = 0; n < 90; n++) {
      var mid = (low + high) / 2;
      var hMidSat = enthalpy(mid, humidityRatioFromTRH(mid, 100));
      if (hMidSat > point.i) high = mid; else low = mid;
    }
    return (low + high) / 2;
  }

  function airDensityKgM3(point) {
    if (!point || !isFinite(point.t) || !isFinite(point.d)) return NaN;
    var tk = point.t + 273.15;
    if (tk <= 0) return NaN;
    var w = point.d / 1000;
    var pvKPa = (w * P) / (0.62198 + w);
    var paKPa = P - pvKPa;
    var paPa = paKPa * 1000;
    var pvPa = pvKPa * 1000;
    return paPa / (287.055 * tk) + pvPa / (461.495 * tk);
  }

  function formatTooltipNumber(value, digits) {
    if (!isFinite(value)) return '—';
    var p = Math.pow(10, digits);
    return (Math.round(value * p) / p).toFixed(digits).replace('.', ',');
  }

  function formatPdfNumber(value, digits) {
    if (!isFinite(value)) return '—';
    var p = Math.pow(10, digits);
    return (Math.round(value * p) / p).toFixed(digits).replace('.', ',');
  }

  function processTypeName(type) {
    if (type === 'heating') return 'Нагрев';
    if (type === 'cooling') return 'Охлаждение';
    if (type === 'isothermal_humidification') return 'Увлажнение паром';
    if (type === 'adiabatic_humidification') return 'Адиабатическое увлажнение';
    if (type === 'merge_streams') return 'Слияние потоков';
    return 'Процесс';
  }

  function processTypeColor(type) {
    if (type === 'heating') return '#d33636';
    if (type === 'cooling') return '#2a72d6';
    if (type === 'isothermal_humidification') return '#2c9f45';
    if (type === 'adiabatic_humidification') return '#2f9d4f';
    if (type === 'merge_streams') return '#111111';
    return '#666666';
  }

  function drawRoundedRect(g, x, y, w, h, r) {
    var rr = Math.min(r, w / 2, h / 2);
    g.beginPath();
    g.moveTo(x + rr, y);
    g.lineTo(x + w - rr, y);
    g.quadraticCurveTo(x + w, y, x + w, y + rr);
    g.lineTo(x + w, y + h - rr);
    g.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
    g.lineTo(x + rr, y + h);
    g.quadraticCurveTo(x, y + h, x, y + h - rr);
    g.lineTo(x, y + rr);
    g.quadraticCurveTo(x, y, x + rr, y);
    g.closePath();
  }

  function pdfBrandingHeight() {
    return 42;
  }

  function pdfFooterHeight() {
    return 18;
  }

  function drawPdfBranding(g, pageWidth) {
    var leftPad = 10;
    var topPad = 8;
    var logoH = 26;
    var logoW = 86;
    var logoX = leftPad;
    var logoY = topPad;

    if (brandLogoImage) {
      var ratio = 1;
      if (brandLogoImage.naturalWidth && brandLogoImage.naturalHeight) {
        ratio = brandLogoImage.naturalWidth / brandLogoImage.naturalHeight;
      }
      logoW = Math.max(70, Math.min(220, logoH * ratio));
      g.drawImage(brandLogoImage, logoX, logoY, logoW, logoH);
    } else {
      drawRoundedRect(g, logoX, logoY, logoW, logoH, 4);
      g.fillStyle = '#133f6e';
      g.fill();

      g.fillStyle = '#ffffff';
      g.font = '700 11px "Roboto Mono", "RobotoMono", monospace';
      g.textAlign = 'center';
      g.textBaseline = 'middle';
      g.fillText('OSNOVA', logoX + logoW / 2, logoY + logoH / 2 + 0.5);
    }

    var tx = logoX + logoW + 10;
    var y1 = logoY + logoH / 2;
    var programText = 'OSNOVA RHcalc i-d v.1.0.3 2026';
    var separatorText = ' | ';
    var siteText = 'osnovaprof.ru';
    g.fillStyle = '#1e3e63';
    g.font = '500 9px "Roboto Mono", "RobotoMono", monospace';
    g.textAlign = 'left';
    g.textBaseline = 'middle';
    g.fillText(programText + separatorText + siteText, tx, y1);
    var leftPartWidth = g.measureText(programText + separatorText).width;
    var siteWidth = g.measureText(siteText).width;

    g.textAlign = 'left';
    g.textBaseline = 'alphabetic';
    return {
      siteX: tx + leftPartWidth,
      siteY: y1 - 6,
      siteW: siteWidth,
      siteH: 12
    };
  }

  function loadBrandLogo() {
    if (brandLogoLoadPromise) return brandLogoLoadPromise;

    brandLogoLoadPromise = new Promise(function (resolve) {
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function () {
        try {
          var testCanvas = document.createElement('canvas');
          testCanvas.width = Math.max(1, img.naturalWidth || img.width || 1);
          testCanvas.height = Math.max(1, img.naturalHeight || img.height || 1);
          var tctx = testCanvas.getContext('2d');
          tctx.drawImage(img, 0, 0);
          testCanvas.toDataURL('image/png');
          brandLogoImage = img;
        } catch (e) {
          brandLogoImage = null;
        }
        resolve(brandLogoImage);
      };
      img.onerror = function () {
        brandLogoImage = null;
        resolve(null);
      };
      img.src = BRAND_LOGO_URL;
    });

    return brandLogoLoadPromise;
  }

  function pdfRowHeight(row) {
    if (row && row.secondaryStartNo) return 42;

  function drawPdfProcessTable(g, topY, rows) {

    var gridTop = y + titleH;
    var colName = 140;
    var colStartNo = 40;
    var colStartT = 45;
    var colStartRh = 38;
    var colStartL = 47;
    var colEndNo = 40;
    var colEndT = 45;
    var colEndRh = 38;
    var colEndL = 47;
    var colQ = 55;
    var colW = 55;

    var xName = tableX + 10;
    var xStart = xName + colName;
    var xEnd = xStart + colStartNo + colStartT + colStartRh + colStartL;
    var xQ = xEnd + colEndNo + colEndT + colEndRh + colEndL;
    var xW = xQ + colQ;
    var rightX = tableX + tableW - 10;

    g.fillStyle = '#294a6c';
    g.font = '600 10px "Roboto Mono", monospace';

    g.fillText('Конечная точка', xEnd + 2, gridTop + 22);
    g.fillText('Q, кВт', xQ + 2, gridTop + 22);

    var subY = gridTop + headerH1 + 18;

    g.fillText('t, °C', xStart + colStartNo + 2, subY);
    g.fillText('φ, %', xStart + colStartNo + colStartT + 2, subY);
    g.fillText('L, м³/ч', xStart + colStartNo + colStartT + colStartRh + 2, subY);
    g.fillText('№', xEnd + 2, subY);
    g.fillText('t, °C', xEnd + colEndNo + 2, subY);
    g.fillText('φ, %', xEnd + colEndNo + colEndT + 2, subY);
    g.fillText('L, м³/ч', xEnd + colEndNo + colEndT + colEndRh + 2, subY);

    g.strokeStyle = '#d8e0ec';
    g.lineWidth = 1;
    g.beginPath();
    g.moveTo(xName, gridTop + headerH1);
    g.lineTo(rightX, gridTop + headerH1);
    g.moveTo(xName, gridTop + headerH1 + headerH2);
    g.lineTo(rightX, gridTop + headerH1 + headerH2);
    g.stroke();

    var dataTop = gridTop + headerH1 + headerH2;
    var currentY = dataTop;

    for (var r = 0; r < data.length; r++) {
      var row = data[r];
      var rowH = pdfRowHeight(row);
      var ry = currentY;
      if (r > 0) {
        g.beginPath();
        g.moveTo(xName, ry);
        g.lineTo(rightX, ry);
        g.stroke();
      }

      g.fillStyle = row.color || '#6a7f95';
      g.fillRect(xName + 3, ry + 10, 6, 6);
      g.fillStyle = '#2b3f57';

      g.fillText(String(row.endRh), xEnd + colEndNo + colEndT + 8, ry + 15);

        g.fillText(String(row.secondaryStartRh), xStart + colStartNo + colStartT + 8, ry + 30);
        g.fillText(String(row.secondaryStartL), xStart + colStartNo + colStartT + colStartRh + 8, ry + 30);
      }

      currentY += rowH;

  function pdfTableHeight(rows) {
    var headerH1 = 36;

  function ensureTooltipEl() {
    if (tooltipEl) return;
    tooltipEl = document.createElement('div');
    tooltipEl.className = 'id-tooltip hidden';
    document.body.appendChild(tooltipEl);
  }

  function hideTooltip() {
    if (!tooltipEl) return;
    tooltipEl.classList.add('hidden');
  }

  function buildTooltipHtml(item) {
    var point = item.point;
    var w = point.d / 1000;
    var pvKPa = (w * P) / (0.62198 + w);
    var pwsKPa = saturationPressure(point.t);
    var twb = wetBulbFromPoint(point);
    var tdp = dewPointFromPvKPa(pvKPa);
    var rho = airDensityKgM3(point);
    var volFlow = (isFinite(item.flow) && item.flow > 0) ? item.flow : NaN;
    var massFlow = (isFinite(volFlow) && isFinite(rho)) ? volFlow * rho : NaN;

    return '' +
      '<div class="id-tooltip-title">№: ' + (item.label || ('P' + item.index)) + '</div>' +
      '<div class="id-tooltip-line"><b>t:</b> ' + formatTooltipNumber(point.t, 1) + ' °C</div>' +
      '<div class="id-tooltip-line"><b>t<sub>вт</sub>:</b> ' + formatTooltipNumber(twb, 1) + ' °C</div>' +
      '<div class="id-tooltip-line"><b>t<sub>тр</sub>:</b> ' + formatTooltipNumber(tdp, 1) + ' °C</div>' +
      '<div class="id-tooltip-line"><b>φ:</b> ' + formatTooltipNumber(point.rh, 1) + '%</div>' +
      '<div class="id-tooltip-line"><b>d:</b> ' + formatTooltipNumber(point.d, 1) + ' г/кг</div>' +
      '<div class="id-tooltip-line"><b>I:</b> ' + formatTooltipNumber(point.i, 1) + ' кДж/кг</div>' +
      '<div class="id-tooltip-line"><b>ρ:</b> ' + formatTooltipNumber(rho, 2) + ' кг/м&sup3;</div>' +
      '<div class="id-tooltip-line"><b>Pп:</b> ' + formatTooltipNumber(pvKPa * 1000, 0) + ' Па</div>' +
      '<div class="id-tooltip-line"><b>Pн:</b> ' + formatTooltipNumber(pwsKPa * 1000, 0) + ' Па</div>' +
      '<div class="id-tooltip-line"><b>L:</b> ' + formatTooltipNumber(volFlow, 0) + ' м&sup3;/ч</div>' +
      '<div class="id-tooltip-line"><b>G:</b> ' + formatTooltipNumber(massFlow, 0) + ' кг/ч</div>';
  }

  function showTooltip(item, clientX, clientY) {
    ensureTooltipEl();
    tooltipEl.innerHTML = buildTooltipHtml(item);
    tooltipEl.classList.remove('hidden');

    var left = clientX + 16;
    var top = clientY + 16;
    var w = tooltipEl.offsetWidth;
    var h = tooltipEl.offsetHeight;
    var pad = 10;

    if (left + w > window.innerWidth - pad) left = clientX - w - 16;
    if (top + h > window.innerHeight - pad) top = clientY - h - 16;
    if (left < pad) left = pad;
    if (top < pad) top = pad;

    tooltipEl.style.left = left + 'px';
    tooltipEl.style.top = top + 'px';
  }

  function loadJsPdf() {
    return new Promise(function (resolve, reject) {
      if (window.jspdf && window.jspdf.jsPDF) {
        resolve(window.jspdf.jsPDF);
        return;
      }

      var existing = document.querySelector('script[data-id-pdf="jspdf"]');
      if (existing) {
        existing.addEventListener('load', function () {
          if (window.jspdf && window.jspdf.jsPDF) resolve(window.jspdf.jsPDF); else reject(new Error('jsPDF not found'));
        });
        existing.addEventListener('error', function () {
          reject(new Error('Failed to load jsPDF'));
        });
        return;
      }

      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js';
      s.async = true;
      s.setAttribute('data-id-pdf', 'jspdf');
      s.onload = function () {
        if (window.jspdf && window.jspdf.jsPDF) resolve(window.jspdf.jsPDF); else reject(new Error('jsPDF not found'));
      };
      s.onerror = function () {
        reject(new Error('Failed to load jsPDF'));
      };
      document.head.appendChild(s);
    });
  }

  function exportDiagramPdf() {
    if (!canvas) return;

    var oldText = exportPdfBtn.textContent;
    exportPdfBtn.disabled = true;
    exportPdfBtn.style.opacity = '0.6';
    exportPdfBtn.style.cursor = 'wait';
    exportPdfBtn.textContent = 'Подготовка PDF...';

    Promise.all([loadJsPdf(), loadBrandLogo()]).then(function (res) {
      var JsPdfCtor = res[0];
      var pointsForExport = lastDrawState.points.slice();
      var segmentsForExport = lastDrawState.segments.slice();
      var exportScale = 3;
      var headerOffset = pdfBrandingHeight();
      var footerOffset = pdfFooterHeight();
      var tableTopOffset = headerOffset;
      var tableHeight = pdfTableHeight(exportProcessRows);
      var savedHoverPoints = hoverPoints.slice();

      var graphCanvas = document.createElement('canvas');
      graphCanvas.width = canvas.width * exportScale;
      graphCanvas.height = (canvas.height + headerOffset + footerOffset) * exportScale;
      var graphCtx = graphCanvas.getContext('2d');
      graphCtx.imageSmoothingEnabled = true;
      graphCtx.imageSmoothingQuality = 'high';
      graphCtx.setTransform(exportScale, 0, 0, exportScale, 0, 0);
      graphCtx.fillStyle = '#ffffff';
      graphCtx.fillRect(0, 0, canvas.width, canvas.height + headerOffset + footerOffset);
      var graphBrand = drawPdfBranding(graphCtx, canvas.width);
      graphCtx.setTransform(exportScale, 0, 0, exportScale, 0, headerOffset * exportScale);

      var prevCtx = ctx;
      ctx = graphCtx;
      drawProcess(pointsForExport, segmentsForExport);
      ctx = prevCtx;
      hoverPoints = savedHoverPoints;
      graphCtx.setTransform(exportScale, 0, 0, exportScale, 0, 0);
      drawPdfPageFooter(graphCtx, canvas.width, canvas.height + headerOffset + footerOffset, 1, 2);

      var tableCanvas = document.createElement('canvas');
      tableCanvas.width = canvas.width * exportScale;
      tableCanvas.height = (tableHeight + headerOffset + footerOffset) * exportScale;
      var tableCtx = tableCanvas.getContext('2d');
      tableCtx.imageSmoothingEnabled = true;
      tableCtx.imageSmoothingQuality = 'high';
      tableCtx.setTransform(exportScale, 0, 0, exportScale, 0, 0);
      tableCtx.fillStyle = '#ffffff';
      tableCtx.fillRect(0, 0, canvas.width, tableHeight + headerOffset + footerOffset);
      var tableBrand = drawPdfBranding(tableCtx, canvas.width);
      drawPdfProcessTable(tableCtx, tableTopOffset, exportProcessRows);
      drawPdfPageFooter(tableCtx, canvas.width, tableHeight + headerOffset + footerOffset, 2, 2);

      var graphImg = graphCanvas.toDataURL('image/png', 1.0);
      var tableImg = tableCanvas.toDataURL('image/png', 1.0);
      var pad = 18;
      var graphPageW = canvas.width + pad * 2;
      var graphPageH = canvas.height + headerOffset + footerOffset + pad * 2;
      var tablePageW = canvas.width + pad * 2;
      var tablePageH = tableHeight + headerOffset + footerOffset + pad * 2;
      var graphOrientation = graphPageW >= graphPageH ? 'landscape' : 'portrait';
      var tableOrientation = tablePageW >= tablePageH ? 'landscape' : 'portrait';

      var doc = new JsPdfCtor({
        orientation: graphOrientation,
        unit: 'pt',
        format: [graphPageW, graphPageH],
        compress: true
      });

      doc.setFillColor(255, 255, 255);
      doc.rect(0, 0, graphPageW, graphPageH, 'F');
      doc.addImage(graphImg, 'PNG', pad, pad, canvas.width, canvas.height + headerOffset + footerOffset, undefined, 'FAST');
      if (graphBrand) {
        doc.link(pad + graphBrand.siteX, pad + graphBrand.siteY, graphBrand.siteW, graphBrand.siteH, {
          url: 'https://osnovaprof.ru'
        });
      }

      doc.addPage([tablePageW, tablePageH], tableOrientation);
      doc.setFillColor(255, 255, 255);
      doc.rect(0, 0, tablePageW, tablePageH, 'F');
      doc.addImage(tableImg, 'PNG', pad, pad, canvas.width, tableHeight + headerOffset + footerOffset, undefined, 'FAST');
      if (tableBrand) {
        doc.link(pad + tableBrand.siteX, pad + tableBrand.siteY, tableBrand.siteW, tableBrand.siteH, {
          url: 'https://osnovaprof.ru'
        });
      }

      doc.save('id-diagramma.pdf');
    }).catch(function () {
      openPrintFallback();
    }).finally(function () {
      exportPdfBtn.disabled = false;
      exportPdfBtn.style.opacity = '1';
      exportPdfBtn.style.cursor = 'pointer';
      exportPdfBtn.textContent = oldText;
    });

  function handleCanvasHover(evt) {
    if (!hoverPoints.length) {
      hideTooltip();
      return;
    }

    var rect = canvas.getBoundingClientRect();
    if (!rect.width || !rect.height) {
      hideTooltip();
      return;
    }

    var scaleX = canvas.width / rect.width;
    var scaleY = canvas.height / rect.height;
    var mx = (evt.clientX - rect.left) * scaleX;
    var my = (evt.clientY - rect.top) * scaleY;

    var hit = null;
    var bestDist2 = 11 * 11;
    for (var i = 0; i < hoverPoints.length; i++) {
      var hp = hoverPoints[i];
      var dx = hp.x - mx;
      var dy = hp.y - my;
      var dist2 = dx * dx + dy * dy;
      if (dist2 <= bestDist2) {
        bestDist2 = dist2;
        hit = hp;
      }
    }

    if (!hit) {
      hideTooltip();
      return;
    }

    showTooltip(hit, evt.clientX, evt.clientY);
  }

  function formatValue(key, value) {
    if (!isFinite(value)) return '';
    if (key === 't') return (Math.round(value * 10) / 10).toFixed(1).replace('.', ',');
    if (key === 'i') return (Math.round(value * 100) / 100).toFixed(2).replace('.', ',');
    if (key === 'rh') return (Math.round(value * 10) / 10).toFixed(1).replace('.', ',');
    if (key === 'd') return (Math.round(value * 100) / 100).toFixed(2).replace('.', ',');
    return String(value);
  }

  function formatStatusNumber(value) {
    return (Math.round(value * 10) / 10).toFixed(1).replace('.', ',');
  }

  function formatFlowInput(value) {
    if (!isFinite(value)) return '';
    return String(Math.round(value * 100) / 100).replace('.', ',');
  }

  function parseNumber(raw) {
    if (typeof raw !== 'string') return NaN;
    var normalized = raw.trim().replace(',', '.');
    if (!normalized) return NaN;
    return Number(normalized);
  }

  function solvePoint(data) {
    var known = 0;
    ['t', 'i', 'rh', 'd'].forEach(function (k) {
      if (isFinite(data[k])) known += 1;
    });

    if (known < 2) {
      return { error: 'Нужно заполнить минимум 2 поля в точке.' };
    }

    var T = data.t;
    var h = data.i;
    var RH = data.rh;
    var d = data.d;
    var w;

    if (isFinite(T) && isFinite(RH)) {
      w = humidityRatioFromTRH(T, RH);
      h = enthalpy(T, w);
    } else if (isFinite(T) && isFinite(h)) {
      w = wFromTH(T, h);
      RH = rhFromTW(T, w);
    } else if (isFinite(T) && isFinite(d)) {
      w = d / 1000;
      h = enthalpy(T, w);
      RH = rhFromTW(T, w);
    } else if (isFinite(h) && isFinite(d)) {
      w = d / 1000;
      T = tFromHW(h, w);
      RH = rhFromTW(T, w);
    } else if (isFinite(h) && isFinite(RH)) {
      var low = -30;
      var high = 80;
      for (var n = 0; n < 100; n++) {
        var mid = (low + high) / 2;
        var wm = humidityRatioFromTRH(mid, RH);
        var hm = enthalpy(mid, wm);
        if (hm > h) high = mid; else low = mid;
      }
      T = (low + high) / 2;
      w = humidityRatioFromTRH(T, RH);
    } else if (isFinite(RH) && isFinite(d)) {
      w = d / 1000;
      var low2 = -30;
      var high2 = 80;
      for (var j = 0; j < 100; j++) {
        var m = (low2 + high2) / 2;
        var wrh = humidityRatioFromTRH(m, RH);
        if (wrh > w) high2 = m; else low2 = m;
      }
      T = (low2 + high2) / 2;
      h = enthalpy(T, w);
    } else {
      return { error: 'Комбинация параметров не поддерживается.' };
    }

    if (!isFinite(T) || !isFinite(h) || !isFinite(RH) || !isFinite(w)) {
      return { error: 'Не удалось вычислить параметры точки.' };
    }

    if (RH < 0 || RH > 100.5 || w < 0) {
      return { error: 'Проверьте корректность данных: состояние вне физического диапазона.' };
    }

    return {
      t: T,
      i: h,
      rh: RH,
      d: w * 1000
    };
  }

  function xFromD(d) {
    return chart.left + ((d - chart.dMin) / (chart.dMax - chart.dMin)) * (chart.right - chart.left);
  }

  function yFromT(t) {
    return chart.bottom - ((t - chart.tMin) / (chart.tMax - chart.tMin)) * (chart.bottom - chart.top);
  }

  function temperatureFromDRH(d, RH) {
    var targetW = d / 1000;
    var low = -60;
    var high = 120;
    for (var n = 0; n < 80; n++) {
      var mid = (low + high) / 2;
      var wMid = humidityRatioFromTRH(mid, RH);
      if (wMid > targetW) high = mid; else low = mid;
    }
    return (low + high) / 2;
  }

  function drawAxesAndGrid() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(chart.left, chart.top, chart.right - chart.left, chart.bottom - chart.top);

    ctx.strokeStyle = '#d6d6d6';
    ctx.lineWidth = 1;

    for (var d = chart.dMin; d <= chart.dMax; d += 5) {
      var xd = xFromD(d);
      ctx.beginPath();
      ctx.moveTo(xd, chart.top);
      ctx.lineTo(xd, chart.bottom);
      ctx.stroke();
    }

    for (var tGrid = chart.tMin; tGrid <= chart.tMax; tGrid += 5) {
      var yGrid = yFromT(tGrid);
      ctx.beginPath();
      ctx.strokeStyle = (tGrid % 10 === 0) ? '#c6c6c6' : '#dddddd';
      ctx.moveTo(chart.left, yGrid);
      ctx.lineTo(chart.right, yGrid);
      ctx.stroke();
    }

    for (var tIso = chart.tMin; tIso <= chart.tMax; tIso += 10) {
      var yIso = yFromT(tIso);
      ctx.beginPath();
      ctx.strokeStyle = '#c3c3c3';
      ctx.lineWidth = 1;
      ctx.moveTo(chart.left, yIso);
      ctx.lineTo(chart.right, yIso);
      ctx.stroke();
    }

    // Подписи энтальпии на направляющей 45° и точки завершения изоэнтальпий
    var enthalpyAngle = -Math.PI / 4;
    var guideX0 = xFromD(8);
    var guideY0 = yFromT(-20);
    function guideYAtX(x) {
      return guideY0 - (x - guideX0);
    }
    function findDForEnthalpyLabel(hVal) {
      var step = 0.25;
      var prevD = chart.dMin;
      var prevX = xFromD(prevD);
      var prevY = yFromT(tFromHW(hVal, prevD / 1000));
      var prevF = prevY - guideYAtX(prevX);
      for (var dTry = chart.dMin + step; dTry <= chart.dMax; dTry += step) {
        var xTry = xFromD(dTry);
        var yTry = yFromT(tFromHW(hVal, dTry / 1000));
        var fTry = yTry - guideYAtX(xTry);
        if (prevF === 0 || fTry === 0 || (prevF < 0 && fTry > 0) || (prevF > 0 && fTry < 0)) {
          var lo = prevD;
          var hi = dTry;
          var fLo = prevF;
          for (var it = 0; it < 30; it++) {
            var mid = (lo + hi) / 2;
            var xMid = xFromD(mid);
            var yMid = yFromT(tFromHW(hVal, mid / 1000));
            var fMid = yMid - guideYAtX(xMid);
            if (fMid === 0) return mid;
            if ((fLo < 0 && fMid > 0) || (fLo > 0 && fMid < 0)) {
              hi = mid;
            } else {
              lo = mid;
              fLo = fMid;
            }
          }
          return (lo + hi) / 2;
        }
        prevD = dTry;
        prevF = fTry;
      }
      return NaN;
    }

    var enthalpyLabels = [];
    var enthalpyLabelByH = {};
    for (var hLabel = 0; hLabel <= 100; hLabel += 5) {
      var dLabel = findDForEnthalpyLabel(hLabel);
      if (!isFinite(dLabel)) continue;
      var tLabel = tFromHW(hLabel, dLabel / 1000);
      if (tLabel < chart.tMin || tLabel > chart.tMax) continue;
      var labelPoint = {
        h: hLabel,
        d: dLabel,
        x: xFromD(dLabel),
        y: yFromT(tLabel)
      };
      enthalpyLabels.push(labelPoint);
      enthalpyLabelByH[hLabel] = labelPoint;
    }

    for (var hLine = chart.iMin; hLine <= chart.iMax; hLine += 5) {
      ctx.beginPath();
      var startedH = false;
      var stopPoint = enthalpyLabelByH[hLine];
      ctx.strokeStyle = '#d0d0d0';
      ctx.lineWidth = 1;

      for (var dH = chart.dMin; dH <= chart.dMax; dH += 0.1) {
        var tH = tFromHW(hLine, dH / 1000);
        if (tH < chart.tMin || tH > chart.tMax) continue;
        var xH = xFromD(dH);
        var yH = yFromT(tH);
        if (!startedH) {
          ctx.moveTo(xH, yH);
          startedH = true;
        } else {
          ctx.lineTo(xH, yH);
        }

        if (stopPoint && dH >= stopPoint.d) {
          ctx.lineTo(stopPoint.x, stopPoint.y);
          break;
        }
      }
      ctx.stroke();
    }

    ctx.fillStyle = '#3f3f3f';
    ctx.font = '12px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (var eh = 0; eh < enthalpyLabels.length; eh++) {
      ctx.save();
      ctx.translate(enthalpyLabels[eh].x, enthalpyLabels[eh].y);
      ctx.rotate(enthalpyAngle);
      ctx.fillText(String(enthalpyLabels[eh].h), 0, 0);
      ctx.restore();
    }

    if (enthalpyLabels.length) {
      var midIdx = Math.floor(enthalpyLabels.length * 0.55);
      var midPoint = enthalpyLabels[Math.min(midIdx, enthalpyLabels.length - 1)];
      var titlePosX = midPoint.x + 20 * Math.cos(enthalpyAngle + Math.PI / 2);
      var titlePosY = midPoint.y + 20 * Math.sin(enthalpyAngle + Math.PI / 2);
      ctx.save();
      ctx.translate(titlePosX, titlePosY);
      ctx.rotate(enthalpyAngle);
      ctx.fillStyle = '#9a9a9a';
      ctx.font = '12px Arial';
      ctx.fillText('Энтальпия I, кДж/кг', 0, 0);
      ctx.restore();
    }

    for (var rh = 10; rh <= 100; rh += 10) {
      ctx.beginPath();
      var started = false;
      ctx.strokeStyle = rh === 100 ? '#5f9fd8' : '#92c7ee';
      ctx.lineWidth = rh === 100 ? 2.0 : 1.5;

      for (var dRh = chart.dMin; dRh <= chart.dMax; dRh += 0.2) {
        var tRh = temperatureFromDRH(dRh, rh);
        var xRh = xFromD(dRh);
        var yRh = yFromT(Math.max(chart.tMin, Math.min(chart.tMax, tRh)));

        if (!started) {
          ctx.moveTo(xRh, yRh);
          started = true;
        } else {
          ctx.lineTo(xRh, yRh);
        }
      }
      ctx.stroke();

      ctx.fillStyle = '#3f3f3f';
      ctx.font = '11px Arial';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      if (rh <= 40) {
        var tTopLabel = chart.tMax - 2;
        var dTopLabel = humidityRatioFromTRH(tTopLabel, rh) * 1000;
        if (dTopLabel >= chart.dMin && dTopLabel <= chart.dMax) {
          ctx.fillText(rh + '%', xFromD(dTopLabel) - 12, chart.top - 4);
        }
      } else {
        var dForLabel = chart.dMax;
        var tLabel = temperatureFromDRH(dForLabel, rh);
        var yLabel = yFromT(Math.max(chart.tMin, Math.min(chart.tMax, tLabel)));
        ctx.fillText(rh + '%', xFromD(dForLabel) + 6, yLabel - 3);
      }

    }

    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 0.6;
    ctx.strokeRect(chart.left, chart.top, chart.right - chart.left, chart.bottom - chart.top);

    ctx.fillStyle = '#4a4a4a';
    ctx.font = '12px Arial';

    for (var dlab = chart.dMin; dlab <= chart.dMax; dlab += 5) {
      var xdLab = xFromD(dlab);
      ctx.fillText(String(dlab), xdLab - 7, chart.bottom + 18);
    }

    for (var tLab = chart.tMin; tLab <= chart.tMax; tLab += 5) {
      var ytLab = yFromT(tLab);
      ctx.fillText(String(tLab), chart.left - 38, ytLab + 4);
    }

    ctx.font = 'bold 13px Arial';
    ctx.fillStyle = '#8f8f8f';
    ctx.fillText('Влагосодержание d, г/кг', (chart.left + chart.right) / 2 - 78, chart.bottom + 36);

    ctx.save();
    ctx.translate(18, (chart.top + chart.bottom) / 2 + 60);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('Температура по сухому термометру t, °C', 0, 0);
    ctx.restore();
  }

  function drawProcess(points, segments) {
    drawAxesAndGrid();
    hideTooltip();
    lastDrawState = {
      points: points.slice(),
      segments: (segments || []).slice()
    };

    if (!points.length) {
      hoverPoints = [];
      return;
    }

    var pointHits = [];
    var segmentList = segments || [];

    function processSegmentColor(p1, p2, type) {
      if (type === 'merge_streams') return '#111111';
      var eps = 0.05;
      if (p2.t < p1.t - eps) return '#2a72d6'; // охлаждение
      if (p2.t > p1.t + eps) return '#d33636'; // нагрев
      return '#2f9d4f'; // t = const
    }

    function drawArrow(x1, y1, x2, y2, color) {
      var ang = Math.atan2(y2 - y1, x2 - x1);
      var len = 10;
      ctx.beginPath();
      ctx.fillStyle = color;
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - len * Math.cos(ang - 0.35), y2 - len * Math.sin(ang - 0.35));
      ctx.lineTo(x2 - len * Math.cos(ang + 0.35), y2 - len * Math.sin(ang + 0.35));
      ctx.closePath();
      ctx.fill();
    }

    for (var s = 0; s < segmentList.length; s++) {
      var seg = segmentList[s];
      if (!seg || !seg.from || !seg.to) continue;
      var sx = xFromD(seg.from.d);
      var sy = yFromT(seg.from.t);
      var tx = xFromD(seg.to.d);
      var ty = yFromT(seg.to.t);
      var segColor = processSegmentColor(seg.from, seg.to, seg.type);

      ctx.beginPath();
      ctx.lineWidth = 2;
      ctx.strokeStyle = segColor;
      ctx.moveTo(sx, sy);
      ctx.lineTo(tx, ty);
      ctx.stroke();
      drawArrow(sx, sy, tx, ty, segColor);

      if (seg.extraPoint) {
        ctx.beginPath();
        ctx.fillStyle = '#111111';
        ctx.arc(sx, sy, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.font = '12px Arial';
        ctx.fillStyle = '#1f2f47';
        ctx.fillText(seg.extraLabel || 'Pдоп', sx + 7, sy - 8);
        pointHits.push({
          index: seg.toIndex + 1,
          label: seg.extraLabel || 'Pдоп',
          point: seg.from,
          flow: seg.extraFlow,
          x: sx,
          y: sy
        });
      }
    }

    for (var i = 0; i < points.length; i++) {
      var p = points[i];
      var x = xFromD(p.d);
      var y = yFromT(p.t);

      var pointColor = '#d33636';
      if (segmentList.length) {
        for (var sp = segmentList.length - 1; sp >= 0; sp--) {
          if (segmentList[sp].toIndex === i) {
            pointColor = processSegmentColor(segmentList[sp].from, segmentList[sp].to, segmentList[sp].type);
            break;
          }
        }
      }

      ctx.beginPath();
      ctx.fillStyle = pointColor;
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fill();
      pointHits.push({
        index: i + 1,
        label: 'P' + (i + 1),
        point: p,
        flow: p.flow,
        x: x,
        y: y
      });

      ctx.font = '12px Arial';
      ctx.fillStyle = '#1f2f47';
      ctx.fillText('P' + (i + 1), x + 7, y - 8);
    }

    hoverPoints = pointHits;
  }

  function populateSelectOptions(selectEl, keys) {
    selectEl.innerHTML = '';
    for (var i = 0; i < keys.length; i++) {
      var key = keys[i];
      var meta = fieldMeta[key];
      if (!meta) continue;
      var opt = document.createElement('option');
      opt.value = key;
      opt.textContent = meta.option;
      selectEl.appendChild(opt);
    }
  }

  function getRowInputs(row) {
    return row.querySelectorAll('input[data-key]');
  }

  function setStatus(msg, isError) {
    statusEl.textContent = msg || '';
    if (!msg) {
      statusEl.className = 'status';
      return;
    }
    statusEl.className = 'status ' + (isError ? 'error' : 'ok');
  }

  function setStageParamOptions(stage, preserveSelection) {
    var processType = stage.typeEl.value;
    var allowed = point2AllowedByProcess[processType] || point2AllowedByProcess.heating;
    var prevKey = preserveSelection ? stage.paramEl.value : '';

    stage.paramEl.innerHTML = '';
    populateSelectOptions(stage.paramEl, allowed);

    if (allowed.indexOf(prevKey) !== -1) {
      stage.paramEl.value = prevKey;
    } else {
      stage.paramEl.value = allowed[0];
    }

    updateStageValueMeta(stage);
  }

  function updateStageValueMeta(stage) {
    var isMerge = stage.typeEl.value === 'merge_streams';
    var isCooling = stage.typeEl.value === 'cooling';
    stage.processRow.classList.toggle('merge-mode', isMerge);
    stage.processRow.classList.toggle('cooling-mode', isCooling);
    stage.flowWrapEl.classList.toggle('hidden', isMerge);
    stage.paramWrapEl.classList.toggle('hidden', isMerge);
    stage.valueWrapEl.classList.toggle('hidden', isMerge);
    stage.coolingCoilWrapEl.classList.toggle('hidden', !isCooling);
    stage.mergeFlowWrapEl.classList.toggle('hidden', !isMerge);
    stage.mergeParam1WrapEl.classList.toggle('hidden', !isMerge);
    stage.mergeValue1WrapEl.classList.toggle('hidden', !isMerge);
    stage.mergeParam2WrapEl.classList.toggle('hidden', !isMerge);
    stage.mergeValue2WrapEl.classList.toggle('hidden', !isMerge);
    stage.mergeFlow2WrapEl.classList.toggle('hidden', !isMerge);

    if (isMerge) {
      stage.mergeFlowMainEl.value = stage.flowEl.value;
      stage.mergeFlowMainEl.readOnly = stage.index !== 1;
      if (!stage.mergeParam1El.options.length) {
        populateSelectOptions(stage.mergeParam1El, mergePointParamKeys);
      }
      if (!stage.mergeParam2El.options.length) {
        populateSelectOptions(stage.mergeParam2El, mergePointParamKeys);
      }
      syncMergeParamSelectors(stage);
      updateMergeValueMeta(stage, 1);
      updateMergeValueMeta(stage, 2);
      return;
    }

    if (isCooling && !stage.coolingCoilTempEl.value.trim()) {
      stage.coolingCoilTempEl.value = formatValue('t', COIL_SURFACE_T);
    }

    var key = stage.paramEl.value;
    var pointIndex = stage.index + 1;

    if (key === 'q') {
      if (stage.typeEl.value === 'heating') {
        stage.valueLabelEl.textContent = 'Q, кВт (Нагреватель)';
        stage.valueEl.placeholder = 'например, 8';
      } else {
        stage.valueLabelEl.textContent = 'Q, кВт (Охладитель)';
        stage.valueEl.placeholder = 'например, 18';
      }
      return;
    }

    if (key === 't') {
      stage.valueLabelEl.textContent = 't, °C (Точка ' + pointIndex + ')';
      stage.valueEl.placeholder = 'например, 16';
      return;
    }

    if (key === 'i') {
      stage.valueLabelEl.textContent = 'i, кДж/кг (Точка ' + pointIndex + ')';
      stage.valueEl.placeholder = 'например, 62';
      return;
    }

    if (key === 'w') {
      stage.valueLabelEl.textContent = 'W, кг/ч (Увлажнитель)';
      stage.valueEl.placeholder = 'например, 5';
      return;
    }

    stage.valueLabelEl.textContent = 'φ, % (Точка ' + pointIndex + ')';
    stage.valueEl.placeholder = 'например, 92';
  }

  function updateMergeValueMeta(stage, slot) {
    var paramEl = slot === 1 ? stage.mergeParam1El : stage.mergeParam2El;
    var labelEl = slot === 1 ? stage.mergeValue1LabelEl : stage.mergeValue2LabelEl;
    var valueEl = slot === 1 ? stage.mergeValue1El : stage.mergeValue2El;
    var key = paramEl.value;
    var meta = fieldMeta[key] || fieldMeta.t;
    labelEl.textContent = meta.label + ' (Доп. точка)';
    valueEl.placeholder = meta.placeholder;
  }

  function syncMergeParamSelectors(stage) {
    var val1 = stage.mergeParam1El.value || mergePointParamKeys[0];
    var val2 = stage.mergeParam2El.value || mergePointParamKeys[1];

    if (val1 === val2) {
      for (var i = 0; i < mergePointParamKeys.length; i++) {
        if (mergePointParamKeys[i] !== val1) {
          val2 = mergePointParamKeys[i];
          break;
        }
      }
    }

    stage.mergeParam1El.value = val1;
    populateSelectOptions(stage.mergeParam2El, mergePointParamKeys.filter(function (key) {
      return key !== val1;
    }));
    if (mergePointParamKeys.indexOf(val2) === -1 || val2 === val1) {
      val2 = stage.mergeParam2El.options.length ? stage.mergeParam2El.options[0].value : '';
    }
    stage.mergeParam2El.value = val2;

    populateSelectOptions(stage.mergeParam1El, mergePointParamKeys.filter(function (key) {
      return key !== val2;
    }));
    if (val1 === val2 || !stage.mergeParam1El.querySelector('option[value="' + val1 + '"]')) {
      val1 = stage.mergeParam1El.options.length ? stage.mergeParam1El.options[0].value : '';
    }
    stage.mergeParam1El.value = val1;

    populateSelectOptions(stage.mergeParam2El, mergePointParamKeys.filter(function (key) {
      return key !== val1;
    }));
    if (!stage.mergeParam2El.querySelector('option[value="' + val2 + '"]')) {
      val2 = stage.mergeParam2El.options.length ? stage.mergeParam2El.options[0].value : '';
    }
    stage.mergeParam2El.value = val2;
  }

  function clearPointRow(row) {
    Array.prototype.forEach.call(getRowInputs(row), function (inp) {
      inp.value = '';
    });
  }

  function fillPointRow(row, data) {
    Array.prototype.forEach.call(getRowInputs(row), function (inp) {
      var key = inp.getAttribute('data-key');
      inp.value = formatValue(key, data[key]);
    });
  }

  function collectManualPoint1Data() {
    var values = emptyPoint();
    var manualCount = 0;
    Array.prototype.forEach.call(getRowInputs(point1Row), function (inp) {
      var key = inp.getAttribute('data-key');
      var raw = inp.value.trim();
      var isManual = inp.getAttribute('data-manual') === '1';
      var parsed = parseNumber(raw);
      if (raw !== '' && isManual && isFinite(parsed)) {
        values[key] = parsed;
        manualCount += 1;
      }
    });
    return { values: values, manualCount: manualCount };
  }

  function clearPoint1Auto() {
    Array.prototype.forEach.call(getRowInputs(point1Row), function (inp) {
      if (inp.getAttribute('data-manual') === '1') return;
      inp.value = '';
      inp.setAttribute('data-auto', '0');
    });
  }

  function fillPoint1Auto(data) {
    Array.prototype.forEach.call(getRowInputs(point1Row), function (inp) {
      var key = inp.getAttribute('data-key');
      if (inp.getAttribute('data-manual') === '1') return;
      inp.value = formatValue(key, data[key]);
      inp.setAttribute('data-auto', '1');
    });
  }

  function clearStagePoints(fromIndex) {
    for (var i = fromIndex; i < processStages.length; i++) {
      clearPointRow(processStages[i].pointRow);
    }
  }

  function recalcPoint1() {
    var manual = collectManualPoint1Data();

    if (manual.manualCount < 2) {
      point1Solved = null;
      clearPoint1Auto();
      clearStagePoints(0);
      drawAxesAndGrid();
      if (manual.manualCount === 1) {
        setStatus('Для точки 1 укажите еще один параметр (всего нужно 2 из 4).', true);
      } else {
        setStatus('');
      }
      return null;
    }

    if (manual.manualCount > 2) {
      point1Solved = null;
      clearStagePoints(0);
      drawAxesAndGrid();
      setStatus('Для точки 1 нужно задать ровно 2 параметра из 4.', true);
      return null;
    }

    var solved = solvePoint(manual.values);
    if (solved.error) {
      point1Solved = null;
      clearStagePoints(0);
      drawAxesAndGrid();
      setStatus('Ошибка в точке 1: ' + solved.error, true);
      return null;
    }

    point1Solved = solved;
    fillPoint1Auto(solved);
    return solved;
  }

  function attachPoint1Listeners() {
    Array.prototype.forEach.call(getRowInputs(point1Row), function (inp) {
      inp.setAttribute('data-manual', '0');
      inp.setAttribute('data-auto', '0');
      inp.addEventListener('input', function () {
        var raw = inp.value.trim();
        if (raw === '') {
          inp.setAttribute('data-manual', '0');
          inp.setAttribute('data-auto', '0');
        } else {
          inp.setAttribute('data-manual', '1');
          inp.setAttribute('data-auto', '0');
        }
        recalcAll();
      });
    });
  }

  function saturatedPointFromTemperature(T) {
    var wSat = humidityRatioFromTRH(T, 100);
    return {
      t: T,
      i: enthalpy(T, wSat),
      rh: 100,
      d: wSat * 1000
    };
  }

  function pointFromTD(T, d) {
    var w = d / 1000;
    return {
      t: T,
      i: enthalpy(T, w),
      rh: rhFromTW(T, w),
      d: d
    };
  }

  function coilAdpPoint(coilSurfaceT) {
    return saturatedPointFromTemperature(coilSurfaceT);
  }

  function pointOnCoilLineByBypass(p1, adp, bypass) {
    var t = adp.t + bypass * (p1.t - adp.t);
    var d = adp.d + bypass * (p1.d - adp.d);
    return pointFromTD(t, d);
  }

  function dryAirMassFlowKgS(airFlowM3h, pRef) {
    var rho = 1.2; // кг/м3 влажного воздуха (приближенно)
    var moistFlow = (airFlowM3h * rho) / 3600; // кг/с
    var wRef = Math.max(0, pRef.d / 1000);
    return moistFlow / (1 + wRef); // кг сухого воздуха/с
  }

  function thermalPowerKw(airFlowM3h, p1, p2) {
    var dryMassFlow = dryAirMassFlowKgS(airFlowM3h, p1);
    return dryMassFlow * (p2.i - p1.i); // кВт
  }

  function coolingCapacityKw(airFlowM3h, p1, p2) {
    var massFlow = dryAirMassFlowKgS(airFlowM3h, p1); // кг сух.возд/с
    var w1 = p1.d / 1000;
    var w2 = p2.d / 1000;
    var wAvg = (w1 + w2) / 2;
    var cp = 1.005 + 1.86 * wAvg; // кДж/(кг*K)

    var qTotal = massFlow * (p1.i - p2.i);
    var qSensible = massFlow * cp * (p1.t - p2.t);
    var qLatent = qTotal - qSensible;

    if (qTotal < 0) qTotal = 0;
    if (qSensible < 0) qSensible = 0;
    if (qLatent < 0) qLatent = 0;

    return {
      total: qTotal,
      sensible: qSensible,
      latent: qLatent
    };
  }

  function condensedWaterKgForHour(airFlowM3h, p1, p2) {
    var dryMassFlow = dryAirMassFlowKgS(airFlowM3h, p1); // кг сух.возд/с
    var deltaW = Math.max(0, (p1.d - p2.d) / 1000); // кг влаги / кг сух.возд
    return dryMassFlow * 3600 * deltaW; // кг/ч
  }

  function humidifierWaterKgForHour(airFlowM3h, p1, p2) {
    var dryMassFlow = dryAirMassFlowKgS(airFlowM3h, p1); // кг сух.возд/с
    var deltaW = Math.max(0, (p2.d - p1.d) / 1000); // кг влаги / кг сух.возд
    return dryMassFlow * 3600 * deltaW; // кг/ч
  }

  function solveMergeStreamsPoint(startPoint, stage, mainFlowM3h) {
    if (!isFinite(mainFlowM3h) || mainFlowM3h <= 0) {
      return { error: 'Для слияния потоков расход основного потока должен быть больше 0.' };
    }

    var extraFlowM3h = parseNumber(stage.mergeFlowEl.value);
    if (!isFinite(extraFlowM3h) || extraFlowM3h <= 0) {
      return { error: 'Для слияния потоков задайте расход дополнительной точки больше 0.' };
    }

    var key1 = stage.mergeParam1El.value;
    var key2 = stage.mergeParam2El.value;
    if (!key1 || !key2 || key1 === key2) {
      return { error: 'Для дополнительной точки выберите 2 разных параметра.' };
    }

    var value1 = parseNumber(stage.mergeValue1El.value);
    var value2 = parseNumber(stage.mergeValue2El.value);
    if (!isFinite(value1) || !isFinite(value2)) {
      return { error: 'Для дополнительной точки заполните оба параметра.' };
    }

    var extraRaw = emptyPoint();
    extraRaw[key1] = value1;
    extraRaw[key2] = value2;
    var extraPoint = solvePoint(extraRaw);
    if (extraPoint.error) {
      return { error: 'Ошибка в дополнительной точке: ' + extraPoint.error };
    }

    var dryMass1 = dryAirMassFlowKgS(mainFlowM3h, startPoint);
    var dryMass2 = dryAirMassFlowKgS(extraFlowM3h, extraPoint);
    if (!isFinite(dryMass1) || dryMass1 <= 0 || !isFinite(dryMass2) || dryMass2 <= 0) {
      return { error: 'Не удалось определить массовый расход одного из потоков.' };
    }

    var totalDryMass = dryMass1 + dryMass2;
    var wMix = (dryMass1 * (startPoint.d / 1000) + dryMass2 * (extraPoint.d / 1000)) / totalDryMass;
    var hMix = (dryMass1 * startPoint.i + dryMass2 * extraPoint.i) / totalDryMass;
    var mixedPoint = solvePoint({ i: hMix, d: wMix * 1000 });
    if (mixedPoint.error) {
      return { error: 'Не удалось вычислить параметры смешанного потока.' };
    }

    return {
      point: mixedPoint,
      extraPoint: extraPoint,
      mainFlow: mainFlowM3h,
      extraFlow: extraFlowM3h,
      totalFlow: mainFlowM3h + extraFlowM3h,
      condensation: false
    };
  }

  function solveHeatingPoint(startPoint, key, value, airFlowM3h) {
    if (key !== 't' && key !== 'i' && key !== 'q') {
      return { error: 'Для нагрева можно задавать только t, i или Q.' };
    }

    var solved;
    if (key === 'q') {
      if (!isFinite(airFlowM3h) || airFlowM3h <= 0) {
        return { error: 'Для расчета по мощности Q задайте расход воздуха больше 0.' };
      }
      if (value <= 0) {
        return { error: 'Мощность нагревателя Q должна быть больше 0 кВт.' };
      }

      var dryMassFlow = dryAirMassFlowKgS(airFlowM3h, startPoint);
      if (!isFinite(dryMassFlow) || dryMassFlow <= 0) {
        return { error: 'Не удалось определить массовый расход воздуха.' };
      }

      var h2 = startPoint.i + value / dryMassFlow;
      var fromQ = solvePoint({ i: h2, d: startPoint.d });
      if (fromQ.error) return fromQ;
      solved = fromQ;
    } else {
      var secondRaw = emptyPoint();
      secondRaw.d = startPoint.d;
      secondRaw[key] = value;
      var fromParam = solvePoint(secondRaw);
      if (fromParam.error) return fromParam;
      solved = fromParam;
    }

    var eps = 0.02;
    if (solved.t <= startPoint.t + eps || solved.i <= startPoint.i + eps) {
      return { error: 'Для нагрева следующая точка должна иметь более высокие t и i.' };
    }

    solved.d = startPoint.d;
    return { point: solved, condensation: false };
  }

  function solveCoolingPoint(startPoint, key, value, airFlowM3h, coilSurfaceT) {
    if (key !== 't' && key !== 'rh' && key !== 'q') {
      return { error: 'Для охлаждения можно задавать только t, φ или Q.' };
    }

    if (!isFinite(coilSurfaceT)) {
      return { error: 'Введите корректную температуру теплообменника.' };
    }

    if (startPoint.t <= coilSurfaceT + 0.05) {
      return { error: 'Для охлаждения температура входной точки должна быть выше температуры теплообменника (' + formatStatusNumber(coilSurfaceT) + '°C).' };
    }

    var adp = coilAdpPoint(coilSurfaceT);
    var dewPoint = dewPointFromPvKPa((startPoint.d / 1000 * P) / (0.62198 + startPoint.d / 1000));
    var condensationPossible = isFinite(dewPoint) && dewPoint > coilSurfaceT + 0.05;
    var dryEndPoint = null;
    if (!condensationPossible) {
      dryEndPoint = solvePoint({ t: coilSurfaceT, d: startPoint.d });
      if (dryEndPoint.error) return dryEndPoint;
    }

    function validateCoolingPoint(solvedPoint, allowCondensation) {
      if (!isFinite(solvedPoint.t) || !isFinite(solvedPoint.i) || !isFinite(solvedPoint.rh) || !isFinite(solvedPoint.d)) {
        return { error: 'Не удалось вычислить параметры следующей точки.' };
      }

      var eps = 0.001;
      if (solvedPoint.t >= startPoint.t - eps || solvedPoint.i >= startPoint.i - eps) {
        return { error: 'Для охлаждения следующая точка должна иметь меньшие t и i.' };
      }
      if (!allowCondensation && Math.abs(solvedPoint.d - startPoint.d) > 0.05) {
        return { error: 'Для сухого охлаждения влагосодержание должно оставаться постоянным.' };
      }
      if (allowCondensation && solvedPoint.d > startPoint.d + eps) {
        return { error: 'Для охлаждения с конденсацией влагосодержание не должно расти.' };
      }
      if (solvedPoint.rh < 0 || solvedPoint.rh > 100.5 || solvedPoint.d < 0) {
        return { error: 'Проверьте корректность данных: состояние вне физического диапазона.' };
      }
      return { point: solvedPoint, condensation: allowCondensation };
    }

    if (!condensationPossible) {
      var drySolved;
      if (key === 't') {
        if (value >= startPoint.t) {
          return { error: 'Для охлаждения t следующей точки должна быть ниже входной.' };
        }
        if (value < coilSurfaceT - 0.05) {
          return { error: 't следующей точки не может быть ниже ' + formatStatusNumber(coilSurfaceT) + '°C.' };
        }
        drySolved = solvePoint({ t: value, d: startPoint.d });
      } else if (key === 'rh') {
        if (value <= startPoint.rh + 0.05 || value > 100) {
          return { error: 'Для охлаждения φ следующей точки должна быть больше входной и не выше 100%.' };
        }
        drySolved = solvePoint({ rh: value, d: startPoint.d });
        if (drySolved.error) return drySolved;
        if (drySolved.t < coilSurfaceT - 0.05) {
          return {
            error: 'При tпов=' + formatStatusNumber(coilSurfaceT) + '°C без конденсации максимум достигаемой влажности: ' +
              formatStatusNumber(dryEndPoint.rh) + '%.'
          };
        }
      } else {
        if (!isFinite(airFlowM3h) || airFlowM3h <= 0) {
          return { error: 'Для расчета по мощности Q задайте расход воздуха больше 0.' };
        }
        if (value <= 0) {
          return { error: 'Полная мощность охладителя Q должна быть больше 0 кВт.' };
        }
        var qDryMax = coolingCapacityKw(airFlowM3h, startPoint, dryEndPoint).total;
        if (value > qDryMax + 0.05) {
          return {
            error: 'Заданная Q выше предельной для сухого охлаждения. Максимум: ' +
              formatStatusNumber(qDryMax) + ' кВт.'
          };
        }
        var lowDry = coilSurfaceT;
        var highDry = startPoint.t;
        for (var dIt = 0; dIt < 90; dIt++) {
          var midDry = (lowDry + highDry) / 2;
          var pointMidDry = solvePoint({ t: midDry, d: startPoint.d });
          var qMidDry = coolingCapacityKw(airFlowM3h, startPoint, pointMidDry).total;
          if (qMidDry > value) lowDry = midDry; else highDry = midDry;
        }
        drySolved = solvePoint({ t: (lowDry + highDry) / 2, d: startPoint.d });
      }
      if (drySolved.error) return drySolved;
      return validateCoolingPoint(drySolved, false);
    }

    var solved;
    var bypass;

    if (key === 't') {
      if (value >= startPoint.t) {
        return { error: 'Для охлаждения t следующей точки должна быть ниже входной.' };
      }
      if (value < coilSurfaceT - 0.05) {
        return { error: 't следующей точки не может быть ниже ' + formatStatusNumber(coilSurfaceT) + '°C.' };
      }

      bypass = (value - adp.t) / (startPoint.t - adp.t);
      if (bypass < 0 || bypass > 1) {
        return { error: 'Заданная t недостижима при tпов=' + formatStatusNumber(coilSurfaceT) + '°C.' };
      }
      solved = pointOnCoilLineByBypass(startPoint, adp, bypass);
    } else if (key === 'rh') {
      if (value <= startPoint.rh + 0.05 || value > 100) {
        return { error: 'Для охлаждения φ следующей точки должна быть больше входной и не выше 100%.' };
      }

      var low = 0;
      var high = 1;
      for (var n = 0; n < 90; n++) {
        var mid = (low + high) / 2;
        var pointMid = pointOnCoilLineByBypass(startPoint, adp, mid);
        if (pointMid.rh > value) low = mid; else high = mid;
      }
      bypass = (low + high) / 2;
      solved = pointOnCoilLineByBypass(startPoint, adp, bypass);
    } else {
      if (!isFinite(airFlowM3h) || airFlowM3h <= 0) {
        return { error: 'Для расчета по мощности Q задайте расход воздуха больше 0.' };
      }
      if (value <= 0) {
        return { error: 'Полная мощность охладителя Q должна быть больше 0 кВт.' };
      }

      var qMax = coolingCapacityKw(airFlowM3h, startPoint, adp).total;
      if (value > qMax + 0.05) {
        return { error: 'Заданная Q выше предельной. Максимум: ' + formatStatusNumber(qMax) + ' кВт.' };
      }

      var lowQ = 0;
      var highQ = 1;
      for (var m = 0; m < 90; m++) {
        var midQ = (lowQ + highQ) / 2;
        var pointMidQ = pointOnCoilLineByBypass(startPoint, adp, midQ);
        var qMid = coolingCapacityKw(airFlowM3h, startPoint, pointMidQ).total;
        if (qMid > value) lowQ = midQ; else highQ = midQ;
      }
      bypass = (lowQ + highQ) / 2;
      solved = pointOnCoilLineByBypass(startPoint, adp, bypass);
    }

    return validateCoolingPoint(solved, true);
  }

  function solveAdiabaticHumidificationPoint(startPoint, key, value, airFlowM3h) {
    if (key !== 'rh' && key !== 'w') {
      return { error: 'Для адиабатического увлажнения можно задавать только φ или W.' };
    }

    var solved;
    if (key === 'rh') {
      if (value <= startPoint.rh + 0.05 || value > 100) {
        return { error: 'Для адиабатического увлажнения φ следующей точки должна быть больше входной и не выше 100%.' };
      }
      solved = solvePoint({ i: startPoint.i, rh: value });
    } else {
      if (!isFinite(airFlowM3h) || airFlowM3h <= 0) {
        return { error: 'Для расчета по W задайте расход воздуха больше 0.' };
      }
      if (value <= 0) {
        return { error: 'Масса испарившейся воды W должна быть больше 0 кг/ч.' };
      }
      var dryMassFlow = dryAirMassFlowKgS(airFlowM3h, startPoint);
      if (!isFinite(dryMassFlow) || dryMassFlow <= 0) {
        return { error: 'Не удалось определить массовый расход воздуха.' };
      }
      var deltaW = value / (dryMassFlow * 3600);
      var d2 = startPoint.d + deltaW * 1000;
      solved = solvePoint({ i: startPoint.i, d: d2 });
    }
    if (solved.error) return solved;

    if (!isFinite(solved.t) || !isFinite(solved.i) || !isFinite(solved.rh) || !isFinite(solved.d)) {
      return { error: 'Не удалось вычислить параметры следующей точки.' };
    }

    var eps = 0.001;
    if (solved.t >= startPoint.t - eps || solved.d <= startPoint.d + eps) {
      return { error: 'Для адиабатического увлажнения следующая точка должна иметь меньшую t и большее d.' };
    }

    if (solved.rh < 0 || solved.rh > 100.5 || solved.d < 0) {
      return { error: 'Проверьте корректность данных: состояние вне физического диапазона.' };
    }

    solved.i = startPoint.i;
    return { point: solved, condensation: false };
  }

  function solveIsothermalHumidificationPoint(startPoint, key, value, airFlowM3h) {
    if (key !== 'rh' && key !== 'w') {
      return { error: 'Для изотермического увлажнения можно задавать только φ или W.' };
    }

    var solved;
    if (key === 'rh') {
      if (value <= startPoint.rh + 0.05 || value > 100) {
        return { error: 'Для изотермического увлажнения φ следующей точки должна быть больше входной и не выше 100%.' };
      }
      solved = solvePoint({ t: startPoint.t, rh: value });
    } else {
      if (!isFinite(airFlowM3h) || airFlowM3h <= 0) {
        return { error: 'Для расчета по W задайте расход воздуха больше 0.' };
      }
      if (value <= 0) {
        return { error: 'Масса испарившейся воды W должна быть больше 0 кг/ч.' };
      }
      var dryMassFlow = dryAirMassFlowKgS(airFlowM3h, startPoint);
      if (!isFinite(dryMassFlow) || dryMassFlow <= 0) {
        return { error: 'Не удалось определить массовый расход воздуха.' };
      }
      var deltaW = value / (dryMassFlow * 3600);
      var d2 = startPoint.d + deltaW * 1000;
      solved = solvePoint({ t: startPoint.t, d: d2 });
    }
    if (solved.error) return solved;

    if (!isFinite(solved.t) || !isFinite(solved.i) || !isFinite(solved.rh) || !isFinite(solved.d)) {
      return { error: 'Не удалось вычислить параметры следующей точки.' };
    }

    var eps = 0.001;
    if (solved.d <= startPoint.d + eps || solved.i <= startPoint.i + eps) {
      return { error: 'Для изотермического увлажнения следующая точка должна иметь большее d и i.' };
    }

    if (Math.abs(solved.t - startPoint.t) > 0.05) {
      return { error: 'Не удалось сохранить изотермическое условие (t = const).' };
    }

    if (solved.rh < 0 || solved.rh > 100.5 || solved.d < 0) {
      return { error: 'Проверьте корректность данных: состояние вне физического диапазона.' };
    }

    solved.t = startPoint.t;
    return { point: solved, condensation: false };
  }

  function solveSecondPoint(startPoint, processType, key, value, airFlowM3h, stage) {
    if (processType === 'merge_streams') {
      return { error: 'Для слияния потоков используйте параметры дополнительной точки.' };
    }
    if (!isFinite(value)) {
      return { error: 'Введите корректное значение параметра процесса.' };
    }

    if (processType === 'heating') {
      return solveHeatingPoint(startPoint, key, value, airFlowM3h);
    }
    if (processType === 'cooling') {
      return solveCoolingPoint(startPoint, key, value, airFlowM3h, parseNumber(stage.coolingCoilTempEl.value));
    }
    if (processType === 'adiabatic_humidification') {
      return solveAdiabaticHumidificationPoint(startPoint, key, value, airFlowM3h);
    }
    if (processType === 'isothermal_humidification') {
      return solveIsothermalHumidificationPoint(startPoint, key, value, airFlowM3h);
    }
    return { error: 'Неизвестный тип процесса.' };
  }

  function updateAddProcessBtnState() {
    var canAdd = processStages.length < MAX_PROCESSES;
    addProcessBtn.disabled = !canAdd;
    addProcessBtn.style.opacity = canAdd ? '1' : '0.6';
    addProcessBtn.style.cursor = canAdd ? 'pointer' : 'not-allowed';
  }

  function recalcAll() {
    exportProcessRows = [];
    var p1 = recalcPoint1();
    if (!p1) {
      return false;
    }

    if (!processStages.length) {
      drawProcess([p1], []);
      setStatus('Добавьте процесс нагрева, охлаждения, увлажнения или слияния потоков.', false);
      return false;
    }

    var initialFlow = parseNumber(processStages[0].flowEl.value);
    var initialFlowIsValid = isFinite(initialFlow) && initialFlow > 0;
    p1.flow = initialFlowIsValid ? initialFlow : NaN;

    var points = [p1];
    var segments = [];
    var summaries = [];
    var outOfRange = p1.d < chart.dMin || p1.d > chart.dMax || p1.t < chart.tMin || p1.t > chart.tMax;

    if (!initialFlowIsValid) {
      clearStagePoints(0);
      drawProcess(points, segments);
      setStatus('Введите расход воздуха в процессе 1 (м³/ч) больше 0.', true);
      return false;
    }

    var currentFlow = initialFlow;

    for (var i = 0; i < processStages.length; i++) {
      var stage = processStages[i];
      var startPoint = points[points.length - 1];
      startPoint.flow = currentFlow;
      if (stage.index > 1) {
        stage.flowEl.value = formatFlowInput(currentFlow);
      }
      stage.mergeFlowMainEl.value = formatFlowInput(currentFlow);

      var result;
      if (stage.typeEl.value === 'merge_streams') {
        if (
          stage.mergeFlowEl.value.trim() === '' ||
          stage.mergeValue1El.value.trim() === '' ||
          stage.mergeValue2El.value.trim() === ''
        ) {
          clearStagePoints(i);
          drawProcess(points, segments);
          setStatus('Заполните расход и 2 параметра дополнительной точки для процесса ' + (i + 1) + '.', false);
          return false;
        }
        result = solveMergeStreamsPoint(startPoint, stage, currentFlow);
      } else {
        var key = stage.paramEl.value;
        var raw = stage.valueEl.value.trim();

        if (raw === '' || !isFinite(parseNumber(raw))) {
          clearStagePoints(i);
          drawProcess(points, segments);
          if (summaries.length) {
            setStatus(summaries.join(' | ') + ' Заполните параметр процесса ' + (i + 1) + '.', false);
          } else {
            setStatus('Заполните параметр процесса 1.', false);
          }
          return false;
        }

        var value = parseNumber(raw);
        result = solveSecondPoint(startPoint, stage.typeEl.value, key, value, currentFlow, stage);
      }

      if (result.error) {
        clearStagePoints(i);
        drawProcess(points, segments);
        setStatus('Ошибка в процессе ' + (i + 1) + ': ' + result.error, true);
        return false;
      }

      var nextPoint = result.point;
      nextPoint.flow = result.totalFlow || currentFlow;
      fillPointRow(stage.pointRow, nextPoint);
      points.push(nextPoint);

      outOfRange = outOfRange || (
        nextPoint.d < chart.dMin ||
        nextPoint.d > chart.dMax ||
        nextPoint.t < chart.tMin ||
        nextPoint.t > chart.tMax
      );

      if (stage.typeEl.value === 'merge_streams') {
        segments.push({
          from: startPoint,
          to: nextPoint,
          type: stage.typeEl.value,
          toIndex: points.length - 1
        });
        segments.push({
          from: result.extraPoint,
          to: nextPoint,
          type: stage.typeEl.value,
          toIndex: points.length - 1,
          extraPoint: true,
          extraLabel: 'P' + (i + 2) + 'д',
          extraFlow: result.extraFlow
        });
      } else {
        segments.push({
          from: startPoint,
          to: nextPoint,
          type: stage.typeEl.value,
          toIndex: points.length - 1
        });
      }

      if (stage.typeEl.value === 'heating') {
        var qHeat = thermalPowerKw(currentFlow, startPoint, nextPoint);
        summaries.push('Процесс ' + (i + 1) + ': Q=' + formatStatusNumber(Math.abs(qHeat)) + ' кВт');
        exportProcessRows.push({
          name: processTypeName(stage.typeEl.value),
          nameLines: stage.typeEl.value === 'adiabatic_humidification' ? ['Адиабатическое', 'увлажнение'] : null,
          color: processTypeColor(stage.typeEl.value),
          startNo: i + 1,
          startT: formatPdfNumber(startPoint.t, 1),
          startRh: formatPdfNumber(startPoint.rh, 1),
          startL: formatPdfNumber(currentFlow, 0),
          endNo: i + 2,
          endT: formatPdfNumber(nextPoint.t, 1),
          endRh: formatPdfNumber(nextPoint.rh, 1),
          endL: formatPdfNumber(currentFlow, 0),
          q: formatPdfNumber(qHeat, 1),
          w: '—'
        });
      } else if (stage.typeEl.value === 'cooling') {
        var cooling = coolingCapacityKw(currentFlow, startPoint, nextPoint);
        var waterKg = condensedWaterKgForHour(currentFlow, startPoint, nextPoint);
        summaries.push('Процесс ' + (i + 1) + ': Q=' + formatStatusNumber(cooling.total) + ' кВт, W=' + formatStatusNumber(waterKg) + ' кг');
        exportProcessRows.push({
          name: processTypeName(stage.typeEl.value),
          nameLines: stage.typeEl.value === 'adiabatic_humidification' ? ['Адиабатическое', 'увлажнение'] : null,
          color: processTypeColor(stage.typeEl.value),
          startNo: i + 1,
          startT: formatPdfNumber(startPoint.t, 1),
          startRh: formatPdfNumber(startPoint.rh, 1),
          startL: formatPdfNumber(currentFlow, 0),
          endNo: i + 2,
          endT: formatPdfNumber(nextPoint.t, 1),
          endRh: formatPdfNumber(nextPoint.rh, 1),
          endL: formatPdfNumber(currentFlow, 0),
          q: formatPdfNumber(-cooling.total, 1),
          w: formatPdfNumber(-waterKg, 1)
        });
      } else if (stage.typeEl.value === 'merge_streams') {
        summaries.push(
          'Процесс ' + (i + 1) + ': Lсум=' + formatStatusNumber(result.totalFlow) +
          ' м³/ч, t=' + formatStatusNumber(nextPoint.t) +
          ' °C, φ=' + formatStatusNumber(nextPoint.rh) + ' %'
        );
        exportProcessRows.push({
          name: processTypeName(stage.typeEl.value),
          color: processTypeColor(stage.typeEl.value),
          secondaryStartNo: String(i + 1) + "'",
          secondaryStartT: formatPdfNumber(result.extraPoint.t, 1),
          secondaryStartRh: formatPdfNumber(result.extraPoint.rh, 1),
          secondaryStartL: formatPdfNumber(result.extraFlow, 0),
          startNo: i + 1,
          startT: formatPdfNumber(startPoint.t, 1),
          startRh: formatPdfNumber(startPoint.rh, 1),
          startL: formatPdfNumber(currentFlow, 0),
          endNo: i + 2,
          endT: formatPdfNumber(nextPoint.t, 1),
          endRh: formatPdfNumber(nextPoint.rh, 1),
          endL: formatPdfNumber(result.totalFlow, 0),
          q: '—',
          w: '—'
        });
      } else {
        var humidifierWaterKg = humidifierWaterKgForHour(currentFlow, startPoint, nextPoint);
        summaries.push(
          'Процесс ' + (i + 1) + ': Масса поступившей в воздух влаги W=' + formatStatusNumber(humidifierWaterKg) + ' кг'
        );
        exportProcessRows.push({
          name: processTypeName(stage.typeEl.value),
          nameLines: stage.typeEl.value === 'adiabatic_humidification' ? ['Адиабатическое', 'увлажнение'] : null,
          color: processTypeColor(stage.typeEl.value),
          startNo: i + 1,
          startT: formatPdfNumber(startPoint.t, 1),
          startRh: formatPdfNumber(startPoint.rh, 1),
          startL: formatPdfNumber(currentFlow, 0),
          endNo: i + 2,
          endT: formatPdfNumber(nextPoint.t, 1),
          endRh: formatPdfNumber(nextPoint.rh, 1),
          endL: formatPdfNumber(currentFlow, 0),
          q: formatPdfNumber(thermalPowerKw(currentFlow, startPoint, nextPoint), 1),
          w: formatPdfNumber(humidifierWaterKg, 1)
        });
      }

      currentFlow = nextPoint.flow;
    }

    drawProcess(points, segments);

    var msg = summaries.join(' | ');
    if (outOfRange) {
      msg += ' Внимание: часть точек вне диапазона графика (d: 0..35 г/кг, t: -35..50°C).';
    }
    setStatus(msg, outOfRange);
    return true;
  }

  function attachStageListeners(stage) {
    stage.typeEl.addEventListener('change', function () {
      setStageParamOptions(stage, false);
      stage.valueEl.value = '';
      stage.mergeValue1El.value = '';
      stage.mergeValue2El.value = '';
      stage.mergeFlowEl.value = '';
      stage.mergeFlowMainEl.value = stage.flowEl.value;
      recalcAll();
    });

    stage.paramEl.addEventListener('change', function () {
      updateStageValueMeta(stage);
      stage.valueEl.value = '';
      recalcAll();
    });

    stage.valueEl.addEventListener('input', recalcAll);
    stage.coolingCoilTempEl.addEventListener('input', recalcAll);
    stage.mergeFlowMainEl.addEventListener('input', function () {
      stage.flowEl.value = stage.mergeFlowMainEl.value;
      recalcAll();
    });
    stage.mergeFlowEl.addEventListener('input', recalcAll);
    stage.mergeParam1El.addEventListener('change', function () {
      syncMergeParamSelectors(stage);
      updateMergeValueMeta(stage, 1);
      updateMergeValueMeta(stage, 2);
      stage.mergeValue1El.value = '';
      stage.mergeValue2El.value = '';
      recalcAll();
    });
    stage.mergeParam2El.addEventListener('change', function () {
      syncMergeParamSelectors(stage);
      updateMergeValueMeta(stage, 1);
      updateMergeValueMeta(stage, 2);
      stage.mergeValue1El.value = '';
      stage.mergeValue2El.value = '';
      recalcAll();
    });
    stage.mergeValue1El.addEventListener('input', recalcAll);
    stage.mergeValue2El.addEventListener('input', recalcAll);

    stage.flowEl.addEventListener('input', function () {
      recalcAll();
    });

    stage.removeBtn.addEventListener('click', function () {
      removeProcessStage(stage);
    });
  }

  function syncStageUi(stage) {
    var isFirst = stage.index === 1;
    stage.typeLabelEl.textContent = 'Процесс ' + stage.index;
    stage.pointTitleEl.textContent = 'Точка ' + (stage.index + 1);
    stage.flowLabelEl.textContent = isFirst
      ? 'Расход воздуха, м³/ч'
      : 'Расход воздуха (из предыдущего процесса), м³/ч';
    stage.flowEl.readOnly = !isFirst;
    stage.flowEl.placeholder = isFirst ? 'например, 1200' : 'из предыдущего процесса';
    stage.mergeFlowMainEl.readOnly = !isFirst;
    stage.mergeFlowMainEl.placeholder = isFirst ? 'например, 1200' : 'из предыдущего процесса';
    if (!stage.coolingCoilTempEl.value.trim()) {
      stage.coolingCoilTempEl.value = formatValue('t', COIL_SURFACE_T);
    }

    if (isFirst) {
      stage.removeBtn.classList.add('hidden');
      stage.removeBtn.disabled = true;
    } else {
      stage.removeBtn.classList.remove('hidden');
      stage.removeBtn.disabled = false;
    }

    updateStageValueMeta(stage);
  }

  function renumberStages() {
    for (var i = 0; i < processStages.length; i++) {
      processStages[i].index = i + 1;
      syncStageUi(processStages[i]);
    }
  }

  function removeProcessStage(stage) {
    if (stage.index === 1) return;
    var idx = processStages.indexOf(stage);
    if (idx <= 0) return;

    stage.processRow.remove();
    stage.pointRow.remove();
    processStages.splice(idx, 1);

    renumberStages();
    updateAddProcessBtnState();
    recalcAll();
  }

  function addProcessStage() {
    if (processStages.length >= MAX_PROCESSES) return;

    var stageIndex = processStages.length + 1;
    var processRow = processRowTemplate(stageIndex);
    var pointRow = pointRowTemplate(stageIndex + 1, true);
    var stage = {
      index: stageIndex,
      processRow: processRow,
      pointRow: pointRow,
      typeLabelEl: processRow.querySelector('[data-role="type-wrap"] label'),
      pointTitleEl: pointRow.querySelector('.point-title'),
      flowLabelEl: processRow.querySelector('label[data-role="flow-label"]'),
      flowWrapEl: processRow.querySelector('[data-role="flow-wrap"]'),
      paramWrapEl: processRow.querySelector('select[data-role="param"]').parentNode,
      typeEl: processRow.querySelector('select[data-role="type"]'),
      flowEl: processRow.querySelector('input[data-role="flow"]'),
      paramEl: processRow.querySelector('select[data-role="param"]'),
      valueWrapEl: processRow.querySelector('input[data-role="value"]').parentNode,
      valueEl: processRow.querySelector('input[data-role="value"]'),
      valueLabelEl: processRow.querySelector('label[data-role="value-label"]'),
      coolingCoilWrapEl: processRow.querySelector('[data-role="cooling-coil-wrap"]'),
      coolingCoilTempEl: processRow.querySelector('input[data-role="cooling-coil-temp"]'),
      mergeFlowWrapEl: processRow.querySelector('[data-role="merge-flow-wrap"]'),
      mergeFlowMainEl: processRow.querySelector('input[data-role="merge-flow-main"]'),
      mergeFlowEl: processRow.querySelector('input[data-role="merge-flow"]'),
      mergeParam1WrapEl: processRow.querySelector('[data-role="merge-param1-wrap"]'),
      mergeParam1El: processRow.querySelector('select[data-role="merge-param1"]'),
      mergeValue1WrapEl: processRow.querySelector('[data-role="merge-value1-wrap"]'),
      mergeValue1El: processRow.querySelector('input[data-role="merge-value1"]'),
      mergeValue1LabelEl: processRow.querySelector('label[data-role="merge-value1-label"]'),
      mergeParam2WrapEl: processRow.querySelector('[data-role="merge-param2-wrap"]'),
      mergeParam2El: processRow.querySelector('select[data-role="merge-param2"]'),
      mergeValue2WrapEl: processRow.querySelector('[data-role="merge-value2-wrap"]'),
      mergeValue2El: processRow.querySelector('input[data-role="merge-value2"]'),
      mergeValue2LabelEl: processRow.querySelector('label[data-role="merge-value2-label"]'),
      mergeFlow2WrapEl: processRow.querySelector('[data-role="merge-flow2-wrap"]'),
      removeBtn: processRow.querySelector('button[data-role="remove"]')
    };

    populateSelectOptions(stage.mergeParam1El, mergePointParamKeys);
    populateSelectOptions(stage.mergeParam2El, mergePointParamKeys.slice(1));
    setStageParamOptions(stage, false);
    attachStageListeners(stage);

    processStages.push(stage);
    pointsWrap.appendChild(processRow);
    pointsWrap.appendChild(pointRow);
    renumberStages();
    updateAddProcessBtnState();
    recalcAll();
  }

  function createRows() {
    pointsWrap.innerHTML = '';
    processStages = [];

    point1Row = pointRowTemplate(1, false);
    pointsWrap.appendChild(point1Row);
    attachPoint1Listeners();

    addProcessStage();
    updateAddProcessBtnState();
  }

  function resetForm() {
    point1Solved = null;
    setStatus('');
    createRows();
    drawAxesAndGrid();
  }

  addProcessBtn.addEventListener('click', addProcessStage);
  exportPdfBtn.addEventListener('click', exportDiagramPdf);
  resetBtn.addEventListener('click', resetForm);
  canvas.addEventListener('mousemove', handleCanvasHover);
  canvas.addEventListener('mouseleave', hideTooltip);

  createRows();
  drawAxesAndGrid();
})();
</script>
  </div>
</body>
</html>
