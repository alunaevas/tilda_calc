<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Общая страница расчетов</title>
  <style>
    :root {
      --bg-1: #f3f8ff;
      --bg-2: #dcecff;
      --bg-3: #ffffff;
      --text-main: #123154;
      --text-muted: #5a7292;
      --glass: rgba(255, 255, 255, 0.5);
      --glass-strong: rgba(255, 255, 255, 0.76);
      --glass-border: rgba(255, 255, 255, 0.75);
      --shadow-main: 0 24px 60px rgba(24, 66, 112, 0.18);
      --tab-active-start: #4b8ff5;
      --tab-active-end: #2f73dc;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "SF Pro Display", "SF Pro Text", "Segoe UI", Arial, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(85% 85% at 0% 0%, rgba(185, 216, 255, 0.9) 0%, rgba(185, 216, 255, 0) 60%),
        radial-gradient(90% 90% at 100% 0%, rgba(211, 228, 255, 0.92) 0%, rgba(211, 228, 255, 0) 62%),
        linear-gradient(180deg, var(--bg-3) 0%, var(--bg-1) 60%, var(--bg-2) 100%);
    }

    .shell {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      gap: 18px;
      align-items: flex-start;
    }

    .sidebar {
      width: 300px;
      flex-shrink: 0;
      margin-top: 0;
      padding: 20px 16px;
      border-radius: 26px;
      border: 1px solid var(--glass-border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.66) 0%, rgba(236, 246, 255, 0.52) 100%);
      box-shadow: var(--shadow-main), inset 0 1px 0 rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: sticky;
      top: 20px;
      height: fit-content;
    }

    .sidebar h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: #1a3f67;
    }

    .sidebar p {
      margin: 0;
      font-size: 14px;
      line-height: 1.4;
      color: var(--text-muted);
    }

    .tabs {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .tab {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 16px;
      padding: 12px 14px;
      position: relative;
      overflow: hidden;
      text-align: left;
      font-size: 14px;
      font-weight: 600;
      color: #21486f;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.72) 0%, rgba(241, 248, 255, 0.6) 100%);
      box-shadow: 0 10px 24px rgba(33, 72, 118, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.85);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease, background 0.18s ease;
    }

    .tab:hover {
      transform: translateY(-1px);
      filter: saturate(1.08);
      box-shadow: 0 12px 26px rgba(33, 72, 118, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.85);
    }

    .tab.active {
      color: #ffffff;
      background: linear-gradient(180deg, var(--tab-active-start) 0%, var(--tab-active-end) 100%);
      border-color: rgba(255, 255, 255, 0.62);
      box-shadow: 0 14px 30px rgba(41, 99, 186, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }

    .tab-assistant {
      color: #4d3552;
      border-color: rgba(255, 214, 225, 0.92);
      background: linear-gradient(180deg, rgba(255, 247, 250, 0.92) 0%, rgba(255, 232, 238, 0.8) 100%);
      box-shadow: 0 10px 24px rgba(145, 72, 103, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .tab-assistant::before {
      content: "";
      position: absolute;
      right: -24px;
      top: -20px;
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: rgba(255, 135, 144, 0.2);
      pointer-events: none;
    }

    .tab-assistant::after {
      content: "";
      position: absolute;
      top: 5px;
      left: 12px;
      width: 66%;
      height: 38%;
      border-radius: 999px;
      background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.45) 0%, rgba(255, 255, 255, 0) 80%);
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .tab-assistant:hover {
      box-shadow: 0 12px 26px rgba(145, 72, 103, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .tab-assistant.active {
      color: #ffffff;
      border-color: rgba(255, 197, 208, 0.72);
      background:
        radial-gradient(circle at 87% 12%, rgba(255, 190, 175, 0.38) 0 25%, rgba(255, 190, 175, 0) 26%),
        linear-gradient(135deg, #c6175d 0%, #ea3e63 52%, #ff6a3c 100%);
      box-shadow: 0 14px 30px rgba(186, 64, 101, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.28);
    }

    .content {
      min-width: 0;
      flex: 1;
      margin-top: 0;
      padding: 0;
      border-radius: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    iframe {
      width: 100%;
      border: 0;
      border-radius: 0;
      display: block;
      min-height: calc(100vh - 80px);
      background: transparent;
      box-shadow: none;
    }

    @media (max-width: 1060px) {
      .shell {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        position: static;
        margin-top: 0;
      }

      .tabs {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .tab {
        text-align: center;
      }

      .content {
        margin-top: 0;
      }

      iframe {
        min-height: calc(100vh - 140px);
      }
    }

    @media (max-width: 760px) {
      .shell {
        padding: 12px;
        gap: 12px;
      }

      .sidebar {
        border-radius: 20px;
      }

      .tabs {
        grid-template-columns: 1fr;
      }

      iframe {
        min-height: 82vh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <h1>Расчетные модули для специалистов ОВ</h1>
      <p>С помощью расчетных модулей можно выполнять расчеты и выгружать отчеты для вставки в проектную и рабочую документацию.</p>

      <nav class="tabs" aria-label="Вкладки расчетов">
        <button class="tab tab-assistant" data-target="hvacgpt" type="button">Ассистент инженера ОВ</button>
        <button class="tab active" data-target="id-diagram" type="button">Построение процессов на id-диаграмме воздуха</button>
        <button class="tab" data-target="ukrup-teplo" type="button">Укрупненный расчет тепловой нагрузки</button>
        <button class="tab" data-target="parking-sp300" type="button">Расчет воздухообмена автостоянки по СП300.2017</button>
        <button class="tab" data-target="parking-ontp" type="button">Расчет воздухообмена автостоянки по ОНТП-01-91</button>
      </nav>
    </aside>

    <main class="content">
      <section class="panel active" id="id-diagram" aria-label="i-d диаграмма">
        <iframe
          src="../id-diagramma/id-diagramma.html"
          title="i-d диаграмма"
          loading="eager"
        ></iframe>
      </section>

      <section class="panel" id="ukrup-teplo" aria-label="Укрупненный расчет тепловой нагрузки">
        <iframe
          src="../ukrup_teplo/calc_ukrup_teplo.html"
          title="Укрупненный расчет тепловой нагрузки"
          loading="lazy"
        ></iframe>
      </section>

      <section class="panel" id="parking-sp300" aria-label="Расчет стоянки СП300">
        <iframe
          src="../calc_parking/calc_sp300.html"
          title="Расчет стоянки СП300"
          loading="lazy"
        ></iframe>
      </section>

      <section class="panel" id="parking-ontp" aria-label="Расчет по ОНТП-01-91">
        <iframe
          src="../calc_parking/calc_ontp.html"
          title="Расчет по ОНТП-01-91"
          loading="lazy"
        ></iframe>
      </section>

      <section class="panel" id="hvacgpt" aria-label="Ассистент инженера ОВ">
        <iframe
          src="../hvacgpt/hvacgpt.html"
          title="Ассистент инженера ОВ"
          loading="lazy"
        ></iframe>
      </section>
    </main>
  </div>

  <script>
    (function () {
      const tabs = Array.from(document.querySelectorAll('.tab'));
      const panels = Array.from(document.querySelectorAll('.panel'));

      function setActive(targetId) {
        tabs.forEach((tab) => {
          tab.classList.toggle('active', tab.dataset.target === targetId);
        });

        panels.forEach((panel) => {
          panel.classList.toggle('active', panel.id === targetId);
        });

        resizeActiveIframe();
      }

      function resizeActiveIframe() {
        const activePanel = document.querySelector('.panel.active');
        if (!activePanel) {
          return;
        }

        const frame = activePanel.querySelector('iframe');
        if (!frame || !frame.contentWindow || !frame.contentWindow.document) {
          return;
        }

        try {
          const body = frame.contentWindow.document.body;
          const html = frame.contentWindow.document.documentElement;
          const doc = frame.contentWindow.document;

          let fixStyle = doc.getElementById('host-align-fix');
          if (!fixStyle) {
            fixStyle = doc.createElement('style');
            fixStyle.id = 'host-align-fix';
            fixStyle.textContent = [
              'html, body { margin: 0 !important; padding: 0 !important; }',
              '#allrecords .id-app, #allrecords .parking-app { top: 0 !important; margin-top: 0 !important; }'
            ].join(' ');
            doc.head.appendChild(fixStyle);
          }

          if (body) {
            body.style.margin = '0';
            body.style.padding = '0';
          }
          if (html) {
            html.style.margin = '0';
            html.style.padding = '0';
          }
          const contentHeight = Math.max(
            body ? body.scrollHeight : 0,
            html ? html.scrollHeight : 0,
            760
          );
          frame.style.height = contentHeight + 'px';
        } catch (err) {
          // If the browser blocks cross-document access, fallback to min-height.
        }
      }

      tabs.forEach((tab) => {
        tab.addEventListener('click', () => setActive(tab.dataset.target));
      });

      const iframes = Array.from(document.querySelectorAll('iframe'));
      iframes.forEach((frame) => {
        frame.addEventListener('load', resizeActiveIframe);
      });

      window.addEventListener('resize', resizeActiveIframe);
      setInterval(resizeActiveIframe, 1000);
      resizeActiveIframe();
    })();
  </script>
</body>
</html>
